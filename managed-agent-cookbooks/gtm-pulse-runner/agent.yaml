name: gtm-pulse-runner
model: claude-sonnet-4-7
system:
  file: ./agents/gtm-pulse-runner.md
tools:
  - type: agent_toolset_20260401
    default_config: { enabled: false }
    configs:
      - { name: read,  enabled: true }
      - { name: write, enabled: true }
      - { name: task,  enabled: true }
  - { type: mcp_toolset, mcp_server_name: hubspot,      default_config: { enabled: true } }
  - { type: mcp_toolset, mcp_server_name: cs-platform,  default_config: { enabled: true } }
  - { type: mcp_toolset, mcp_server_name: slack,        default_config: { enabled: true } }
mcp_servers:
  - { type: url, name: hubspot,      url: "${HUBSPOT_MCP_URL}" }
  - { type: url, name: cs-platform,  url: "${CS_PLATFORM_MCP_URL}" }
  - { type: url, name: slack,        url: "${SLACK_MCP_URL}" }
skills:
  - { from_plugin: ../../rev-ops }
callable_agents:
  - { manifest: ./subagents/data-collector.yaml }
  - { manifest: ./subagents/pulse-composer.yaml }
  - { manifest: ./subagents/delivery-router.yaml }
