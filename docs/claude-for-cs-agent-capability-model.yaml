# ─────────────────────────────────────────────────────────────────────────────
# DOMAIN: onboarding  (9 skills)
# ─────────────────────────────────────────────────────────────────────────────

  - id: onboarding.blocker-review
    name: blocker-review
    version: "1.0.0"
    category: onboarding
    owner: onboarding
    summary: >
      Diagnose and resolve onboarding blockers — anything preventing a customer
      from reaching their next milestone on time. Classifies blockers by type and
      severity, routes to the correct resolution path per the escalation matrix,
      and produces an action plan with named owners and deadlines.
    intended_tasks:
      - Guided diagnostic for a current blocker (--diagnose, default)
      - Formatted escalation brief for a named escalation contact (--escalate)
      - Logging a resolved blocker to account history (--log)
    out_of_scope:
      - Autonomously contacting escalation contacts
      - Modifying PM connector tasks directly
    invocation_cues:
      - "blocker"
      - "stuck"
      - "milestone delayed"
      - "escalate"
      - "not progressing"
    anti_cues:
      - General milestone status (use milestone-tracker)
      - Handoff readiness check (use handoff-doc --readiness)
    priority: standard
    argument_hint: "[<account-name-or-ID>] [--diagnose | --escalate | --log]"
    required_context:
      - onboarding CLAUDE.md (escalation matrix, thresholds, escalation contacts)
    consumes_files:
      - onboarding/CLAUDE.md
    produces_artifacts:
      - Blocker diagnostic with classification and severity
      - Escalation brief (--escalate)
      - Resolved blocker log entry (--log)
    tools_used:
      - CRM connector (optional)
      - PM connector (optional)
    related_skills:
      - onboarding.milestone-tracker
      - onboarding.handoff-doc
    execution_profile:
      pre_flight: reads onboarding CLAUDE.md; routes to cold-start-interview if missing or placeholder-filled
      connector_behavior: falls back to CSM input if CRM/PM unavailable
    constraints:
      - Escalation contacts sourced from profile only; no autonomous outreach
      - Severity classification uses profile escalation thresholds
    risk_level: low
    approval_needed: false
    success_criteria:
      - Blocker classified by type and severity
      - Resolution path identified with named owner and deadline
      - Escalation brief produced when --escalate is used
    known_failure_modes:
      - Profile escalation matrix missing — classification falls back to generic tiers
      - PM connector unavailable — milestone context requires manual input

  - id: onboarding.cold-start-interview
    name: cold-start-interview
    version: "1.0.0"
    category: onboarding
    owner: onboarding
    config_skill: true
    summary: >
      First-time setup for the onboarding company profile. Collects role, onboarding
      model, segment configuration, TtV targets, milestone definitions, success criteria
      model, kickoff and handoff format, escalation matrix, integrations, and CS
      methodology preferences. Writes to onboarding CLAUDE.md so all other onboarding
      skills have required context. Run once at setup; use customize for updates.
    intended_tasks:
      - Full onboarding profile setup (--full)
      - Abbreviated 15-minute setup writing minimum required fields (--quick)
      - Full profile redo (--redo)
      - Integration check only (--check-integrations)
      - Company profile section only (--redo-company-profile)
      - Specific section update (--section <name>)
    out_of_scope:
      - CSM-level account data (use csm.cold-start-interview)
      - Rev-ops metric configuration (use rev-ops.cold-start-interview)
    invocation_cues:
      - "set up onboarding"
      - "configure onboarding"
      - "onboarding profile"
      - "onboarding cold start"
    anti_cues:
      - Profile already configured and needs a targeted update (use customize)
    priority: high
    argument_hint: "[--full | --quick | --redo | --check-integrations | --redo-company-profile | --section <name>]"
    required_context:
      - None (generates the profile)
    consumes_files: []
    produces_artifacts:
