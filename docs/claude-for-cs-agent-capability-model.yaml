  - id: onboarding.milestone-tracker
    name: milestone-tracker
    version: "1.0.0"
    category: onboarding
    owner: onboarding
    summary: >
      Track milestone progress across one account or the full onboarding portfolio.
      Reads milestone framework, at-risk signals, and escalation thresholds from the
      onboarding profile. Pulls current milestone status from PM connector (Asana,
      Linear, Jira, or Monday) if configured.
    intended_tasks:
      - Current-state milestone view for one account (--status, default)
      - Milestone health summary across all active onboarding accounts (--portfolio)
      - At-risk and overdue milestones with recommended actions (--flag)
    out_of_scope:
      - Modifying milestones or task assignments in PM connector
      - TtV performance analysis (use ttv-analysis)
    invocation_cues:
      - "milestone status"
      - "milestone health"
      - "track onboarding"
      - "at-risk milestones"
      - "overdue milestones"
    anti_cues:
      - Blocker diagnosis (use blocker-review)
      - TtV performance analysis (use ttv-analysis)
    priority: standard
    argument_hint: "[<account-name-or-ID>] [--status | --portfolio | --flag]"
    required_context:
      - onboarding CLAUDE.md (milestone framework, at-risk signals, escalation thresholds)
    consumes_files:
      - onboarding/CLAUDE.md
    produces_artifacts:
