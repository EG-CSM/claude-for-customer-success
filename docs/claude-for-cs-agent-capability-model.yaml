  - id: rev-ops.outcome-to-value-tracking
    name: outcome-to-value-tracking
    version: "1.0.0"
    domain: rev-ops
    category: outcome-tracking
    owner: rev-ops
    summary: >
      Tracks value realization per account against OCV-defined milestones using
      L0-L3 rubric. Surfaces systemic patterns when L0 persistence exceeds 40%
      of accounts. Coordinates with deal-to-outcome-tracing for account-level
      detail. Only Ratified OCV entries used (G8).
    intended_tasks:
      - Assess value realization level (L0-L3) per account per OCV entry
      - Track milestone achievement at OCV-defined intervals
      - Flag systemic L0 persistence when >40% of accounts show no measurement
      - Coordinate with deal-to-outcome-tracing for account-level detail
    out_of_scope:
      - Building OCV entries (use outcome-statement-builder)
      - At-close completeness check (use deal-to-outcome-tracing)
      - CRM edits (G9)

    invocation_cues:
      - "value tracking"
      - "outcome to value"
      - "are customers realizing value"
      - "OCV milestone tracking"
      - "L0-L3 value assessment"
    anti_cues:
      - At-close completeness check — use deal-to-outcome-tracing
      - Building outcome statements — use outcome-statement-builder
    priority: medium
    argument_hint: "Specify account cohort or segment; optionally provide OCV list"

    required_context:
      - Ratified OCV entries per account (G8)
      - CS platform activity and milestone data
    consumes_files:
      - rev-ops domain CLAUDE.md (cold-start preflight)
    produces_artifacts:
      - Value realization report with L0-L3 scores per account-OCV pair (Markdown)
      - Systemic pattern memo when L0 persistence >40%

    tools_used:
      - deal-to-outcome-tracing (coordination)
    related_skills:
      - rev-ops.deal-to-outcome-tracing
      - rev-ops.outcome-statement-builder
      - rev-ops.growth-model-vs-actuals-tracking
    execution_profile:
      complexity: T2
      typical_turns: 4-7
      tool_calls_per_run: 2-4

    constraints:
      - G5: assessment is analytical input, not performance ruling
      - G6: data-as-of timestamp on all reads
      - G8: only Ratified OCV entries; provisional OCV flagged with [Low Confidence]
    risk_level: medium
    approval_needed: false

    success_criteria:
      - L0-L3 score applied per account-OCV pair
      - Systemic L0 pattern flagged when threshold exceeded
      - Only Ratified OCV entries used; provisional flagged
      - data-as-of timestamp present
    known_failure_modes:
      - No Ratified OCV entries → report cannot be produced; surface gap to RevOps lead
      - CS platform unavailable → surface failure; do not infer milestone achievement

  - id: rev-ops.pipeline-coverage-analysis
    name: pipeline-coverage-analysis
    version: "1.0.0"
    domain: rev-ops
    category: forecasting
    owner: rev-ops
    summary: >
      Computes pipeline coverage ratio (pipeline / quota) using segment-specific
      win rates rather than a universal 3x assumption. Signal thresholds:
      <2x CRITICAL, 2-3x AT-RISK, 3-5x HEALTHY, >5x INSPECT for concentration.
      Ranks top-3 pipeline exposure risks. Feeds GTM metrics pulse and revenue brief.
    intended_tasks:
      - Compute coverage ratio using segment-specific win rates
      - Apply signal thresholds and categorize coverage health
      - Rank top-3 exposure risks by segment or team
      - Feed coverage data into gtm-unified-metrics-pulse and revenue-brief-generation
    out_of_scope:
      - Pipeline velocity (stage-age tracking) — use pipeline-velocity-tracking
      - Deal health scoring — use deal-health-scoring
      - Forecast variance — use forecast-variance-analysis

    invocation_cues:
      - "pipeline coverage"
      - "do we have enough pipeline"
      - "coverage ratio"
      - "pipeline health"
      - "coverage analysis"
    anti_cues:
      - Pipeline velocity (deals aging) — use pipeline-velocity-tracking
      - Deal health (individual deal scoring) — use deal-health-scoring
    priority: high
    argument_hint: "Specify quota period and optionally scope to segment or team"

    required_context:
      - Pipeline data from CRM (HubSpot preferred)
      - Quota by segment/team for the period
      - Win rate by segment (required; no universal 3x assumption)
    consumes_files:
      - rev-ops domain CLAUDE.md (cold-start preflight)
    produces_artifacts:
      - Coverage analysis report with signal classification by segment (Markdown)
      - Top-3 exposure risk ranking

    tools_used: []
    related_skills:
      - rev-ops.gtm-unified-metrics-pulse
      - rev-ops.revenue-brief-generation
      - rev-ops.pipeline-velocity-tracking
      - rev-ops.scenario-modeling
    execution_profile:
      complexity: T2
      typical_turns: 3-6
      tool_calls_per_run: 2-4

    constraints:
      - G1: all ARR figures flagged [review — not yet a revenue commitment]
      - G6: data-as-of timestamp on all reads
      - Coverage = pipeline ÷ (quota ÷ win rate); never use universal 3x
    risk_level: medium
    approval_needed: false

    success_criteria:
      - Coverage computed using segment-specific win rates
      - Signal classification applied per segment
      - Top-3 exposure risks ranked
      - data-as-of timestamp present
    known_failure_modes:
      - Win rate not configured for segment → request win rate; do not default to 3x without disclosure
      - Quota not set for period → cannot compute coverage; flag to RevOps lead

  - id: rev-ops.pipeline-velocity-tracking
    name: pipeline-velocity-tracking
    version: 1.0.0
    domain: rev-ops
    category: pipeline-intelligence
    owner: rev-ops-lead

    summary: >
      Tracks average sales cycle time by segment, rep, and deal size. Flags deals aging
      past 1.5x the historical average for their current stage. Surfaces velocity trend
      vs. prior quarter to surface where pipeline is slowing before it shows up in a
      missed quarter.

    intended_tasks:
      - Identify deals stalling in a specific stage before the quarter ends
      - Compare current-quarter velocity trend vs. prior quarter
      - Surface aging flags by rep and segment for manager coaching

    out_of_scope:
      - Prescribing manager coaching actions (G5 — analytical input only)
      - Closing or updating deal stage records (G9 — no autonomous CRM edits)

    invocation_cues:
      - "pipeline velocity"
      - "cycle time"
      - "deals aging"
      - "stalling pipeline"
      - "how long are deals taking"

    anti_cues:
      - Individual rep performance review
      - Pipeline forecast amounts (route to pipeline-coverage-analysis)

    priority: standard
    argument_hint: "Scope (rep, segment, or all pipeline)"

    required_context:
      - HubSpot stage entry/exit date history
      - Historical median days-in-stage by segment (trailing 4Q)

    consumes_files:
      - reference/revops-domain-model.md §2

    produces_artifacts:
      - Pipeline velocity report with aging flags (stage-age ratio > 1.5x)

    tools_used:
      - HubSpot (stage history read)

    related_skills:
      - rev-ops.stage-integrity-audit
      - rev-ops.deal-health-scoring
      - rev-ops.pipeline-coverage-analysis

    execution_profile:
      reads_crm: true
      writes_crm: false
      reads_cs_platform: false
      calls_llm: false
      creates_linear_issue: false

    constraints:
      - G5 — velocity flags are analytical inputs; manager owns coaching response
      - G6 — data-as-of required on all stage history reads
      - G7 — aging flags require manager escalation path

    risk_level: low
    approval_needed: false

    success_criteria:
      - All open deals have stage-age ratio calculated
      - Deals exceeding 1.5x flagged with deal name, stage, days, avg, ratio, rep
      - Quarter-over-quarter cycle time trend surfaced

    known_failure_modes:
      - HubSpot stage history unavailable → declare unavailable; do not estimate
      - Segment avg not computable from <4Q history → flag data gap; widen window or note limitation

  - id: rev-ops.quota-sensitivity-analysis
    name: quota-sensitivity-analysis
    version: 1.0.0
    domain: rev-ops
    category: planning
    owner: rev-ops-lead

    summary: >
      Builds quota models from UoG-confirmed AE headcount and revenue target. Models
      structural achievability at five attainment levels (50/65/75/85/100%). Flags when
      hitting plan requires attainment above the 75th percentile of historical actuals.
      Used inside annual-planning-workflow Phase 4 or standalone.

    intended_tasks:
      - Model per-rep quota from UoG output and revenue target
      - Surface attainment scenarios and their ARR outcomes
      - Flag structurally challenging quotas as risk disclosure for leadership

    out_of_scope:
      - Setting or approving quota (G2 — structural input; leadership decides)
      - Changing OTE or comp structure without HR + Finance dual review (G3)

    invocation_cues:
      - "quota model"
      - "is quota achievable"
      - "quota sensitivity"
      - "quota attainment model"
      - "what does quota need to be"

    anti_cues:
      - Individual rep quota review (structural tool, not rep-level)
      - Revenue forecast (route to scenario-modeling)

    priority: standard
    argument_hint: "--phase 4 (inside annual-planning-workflow) or standalone"

    required_context:
      - UoG-confirmed AE count and revenue target (from annual-planning-workflow Phase 2 or company profile)
      - ae_quota from company profile
      - Historical attainment actuals (trailing 4Q) for achievability flag

    consumes_files:
      - reference/revops-domain-model.md §5

    produces_artifacts:
      - Quota sensitivity table (five attainment levels × ARR outcomes)
      - Structural achievability flag with KBCM median citation

    tools_used: []

    related_skills:
      - rev-ops.annual-planning-workflow
      - rev-ops.unit-of-growth-calculator
      - rev-ops.scenario-modeling

    execution_profile:
      reads_crm: false
      writes_crm: false
      reads_cs_platform: false
      calls_llm: false
      creates_linear_issue: false

    constraints:
      - G1 — revenue projections require forecast qualification language
      - G2 — quota output is structural input; decisions require leadership approval
      - G3 — if output changes OTE/comp, HR + Finance dual review required
      - Structural achievability flag is risk disclosure, not quota rejection

    risk_level: medium
    approval_needed: true

    success_criteria:
      - Five-row attainment table (50/65/75/85/100%) with ARR outcome and vs-plan delta
      - Per-rep quota derived from target ÷ AEs required
      - Structural achievability flag fires when plan requires > 75th percentile attainment

    known_failure_modes:
      - UoG inputs not confirmed → request from annual-planning-workflow Phase 2 before proceeding
      - Historical attainment actuals not available → use KBCM 55–65% median; flag as estimate

  - id: rev-ops.revenue-brief-generation
    name: revenue-brief-generation
    version: 1.0.0
    domain: rev-ops
    category: reporting
    owner: rev-ops-lead

    summary: >
      Produces weekly or monthly executive revenue narrative by coordinating outputs from
      all rev-ops agents. Five sections: forecast + pipeline, pipeline health, CS capacity
      status, NRR trajectory, top 3 risks with recommended owner and action. One decision
      required per brief. Delivered as DRAFT for RevOps lead review before distribution.

