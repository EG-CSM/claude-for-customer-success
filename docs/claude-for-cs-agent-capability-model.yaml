      - rev-ops.deal-health-scoring
      - rev-ops.closed-won-to-cs-capacity-modeling
      - rev-ops.growth-model-vs-actuals-tracking
      - rev-ops.scenario-modeling

    execution_profile:
      reads_crm: true
      writes_crm: false
      reads_cs_platform: true
      calls_llm: false
      creates_linear_issue: false

