      - At-risk thresholds sourced from profile
    risk_level: low
    approval_needed: false
    success_criteria:
      - Milestone completion status current per PM connector or CSM input
      - At-risk accounts surfaced with threshold-based classification (--flag)
    known_failure_modes:
      - PM connector not configured — all milestone data requires manual input
      - Milestone framework not defined in profile — tracker uses generic milestone names

  - id: onboarding.onboarding-plan
    name: onboarding-plan
    version: "1.0.0"
    category: onboarding
    owner: onboarding
    summary: >
      Generate, update, or summarize the customer-facing onboarding plan document —
      the primary shared artifact between the CSM and customer team. Defines milestone
      timeline, ownership per stage, first priorities, communication cadence, and
      success criteria placeholder. Reads onboarding model, milestone framework,
      duration targets, and plan format from the onboarding profile.
    intended_tasks:
      - Generate a complete plan after kickoff (--draft, default)
      - Revise the plan after a milestone completes or scope changes (--update)
      - Abbreviated current-status view for async stakeholder updates (--summary)
    out_of_scope:
