  - id: csm.escalation-memo
    name: escalation-memo
    version: "1.0.0"
    category: csm
    owner: csm
    summary: >
      Manages the full escalation lifecycle — opening, updating, and closing escalation
      memos for technical, complaint, executive, and internal escalation types. Routes
      to the correct escalation path per the configured escalation matrix.
    intended_tasks:
      - Open a new escalation memo
      - Update an in-progress escalation with new information
      - Close an escalation with resolution summary
    out_of_scope:
      - Churn risk assessment (use renewals.risk-assessment)
      - Escalation routing decisions (governed by company profile matrix)
    invocation_cues:
      - "escalation memo"
      - "open an escalation"
      - "escalate this account"
      - "update escalation"
      - "close escalation"
    anti_cues:
      - Renewal risk memo (use renewals.risk-assessment or csm.risk-flag)
    priority: high
    argument_hint: "[<account-name>] [--open | --update | --close] [--technical | --complaint | --executive | --internal]"
    required_context:
      - csm CLAUDE.md
      - Account context and escalation details
    consumes_files:
      - csm/CLAUDE.md
    produces_artifacts:
      - Escalation memo (structured markdown)
      - Routing recommendation per escalation matrix
    tools_used:
      - CRM connector (optional)
      - Linear connector (optional)
    related_skills:
      - csm.risk-flag
      - renewals.risk-assessment
    execution_profile:
      pre_flight: reads csm CLAUDE.md; validates escalation matrix exists
      connector_behavior: falls back to manual routing if connectors absent
    constraints:
      - Escalation routing follows configured matrix — not overridden by user instruction
      - Executive escalations require CS leadership acknowledgment
    risk_level: medium
    approval_needed: true
    success_criteria:
      - Escalation memo created with owner, SLA, and routing path
    known_failure_modes:
      - Missing escalation matrix in company profile causes routing failure

