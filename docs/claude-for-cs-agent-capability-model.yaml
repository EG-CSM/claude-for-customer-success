  - id: cs-ops.capacity-planner
    name: capacity-planner
    version: "1.0.0"
    category: cs-ops
    owner: cs-ops
    summary: >
      Assess CSM capacity and coverage across the current book of business.
      Models headcount demand, coverage ratios, and book-of-business distribution
      to surface under- or over-capacity signals at the team and segment level.
    intended_tasks:
      - Current capacity and coverage ratio audit
      - Headcount demand modeling for growth scenarios
      - Book redistribution planning after departures or segment changes
      - Pre-QBR capacity review for CS leadership
    out_of_scope:
      - Hiring decisions or approval (produces recommendations only)
      - Individual performance assessment
      - Renewal or churn forecasting
    invocation_cues:
      - "capacity"
      - "coverage ratio"
      - "CSM headcount"
      - "book of business distribution"
      - "who should take the account"
      - "can we absorb new logos"
    anti_cues:
      - Questions about individual CSM performance reviews
      - Renewal probability scoring (use renewals.risk-assessment)
      - New logo pipeline capacity (use rev-ops.closed-won-to-cs-capacity-modeling)
    priority: standard
    argument_hint: "[--current | --headcount | --redistribution | --departure]"
    required_context:
      - cs-ops CLAUDE.md company profile
      - CSM roster with segment assignments and ARR
    consumes_files:
      - cs-ops/CLAUDE.md
    produces_artifacts:
      - Capacity and coverage ratio report
      - Headcount demand model
      - Redistribution recommendation
    tools_used:
      - CRM connector (optional)
      - CS Platform connector (optional)
    related_skills:
      - cs-ops.segment-analyzer
      - rev-ops.closed-won-to-cs-capacity-modeling
    execution_profile:
      pre_flight: reads cs-ops CLAUDE.md; routes to cold-start-interview if missing
      connector_behavior: falls back to manual input if CRM/CS Platform unavailable
    constraints:
      - Recommendations only — no autonomous roster changes
      - Headcount proposals require CS leadership approval
    risk_level: low
    approval_needed: false
    success_criteria:
      - Coverage ratios computed per segment
      - Under/over-capacity signals surfaced with recommended actions
    known_failure_modes:
      - Stale CSM roster data produces misleading ratios
      - Missing segment assignments cause unallocated ARR

  - id: cs-ops.cold-start-interview
    name: cold-start-interview
    version: "1.0.0"
    category: cs-ops
    owner: cs-ops
    summary: >
      Configures the CS-Ops plugin by collecting team structure, segmentation model,
      health model parameters, reporting cadence, and connector status. Writes the
      cs-ops CLAUDE.md company profile consumed by all other cs-ops skills.
    intended_tasks:
      - First-time cs-ops plugin setup
      - Full company profile rebuild after major org changes
      - Section-specific updates via --section flag
    out_of_scope:
      - CSM-specific company profiles (use csm.cold-start-interview)
      - Onboarding or renewals configuration
    invocation_cues:
      - "set up cs-ops"
      - "configure cs ops"
      - "first time setup"
      - "cs-ops plugin"
    anti_cues:
      - Profile already exists and only one field needs updating (use cs-ops.customize)
    priority: high
    argument_hint: "[--full | --section <section-name>]"
    required_context:
      - None — bootstraps from zero
    consumes_files: []
    produces_artifacts:
      - cs-ops/CLAUDE.md company profile
    tools_used: []
    related_skills:
      - cs-ops.customize
    execution_profile:
      pre_flight: none — this IS the pre-flight for all other cs-ops skills
      connector_behavior: checks connector availability during interview
    constraints:
      - config_skill — governs other skills, not a direct CS action
    risk_level: low
    approval_needed: false
    success_criteria:
      - cs-ops/CLAUDE.md written with no placeholder markers remaining
    known_failure_modes:
      - Incomplete section leaves placeholder markers that trigger repeated cold-start

  - id: cs-ops.customize
    name: customize
    version: "1.0.0"
    category: cs-ops
    owner: cs-ops
    summary: >
      Updates specific sections of the cs-ops company profile without rerunning
      the full cold-start interview. Displays current values before editing and
      confirms changes before writing.
    intended_tasks:
      - Update a single config section (e.g., health model weights, segment thresholds)
      - Reset a section to defaults
      - Show current configuration
    out_of_scope:
      - First-time setup (use cs-ops.cold-start-interview)
      - Updates across multiple domains
    invocation_cues:
      - "update cs-ops config"
      - "change health model weights"
      - "show current cs-ops settings"
    anti_cues:
      - Profile missing or all placeholders (use cs-ops.cold-start-interview)
    priority: standard
    argument_hint: "[--show | --section <name> | --reset]"
    required_context:
      - Existing cs-ops/CLAUDE.md
    consumes_files:
      - cs-ops/CLAUDE.md
    produces_artifacts:
      - Updated cs-ops/CLAUDE.md
    tools_used: []
    related_skills:
      - cs-ops.cold-start-interview
    execution_profile:
      pre_flight: reads and displays current values before any edit
      connector_behavior: n/a
    constraints:
      - config_skill
      - Confirms changes before writing
    risk_level: low
    approval_needed: false
    success_criteria:
      - Target section updated; no other sections modified
    known_failure_modes:
      - Editing wrong section if --section argument is ambiguous

  - id: cs-ops.data-quality-check
    name: data-quality-check
    version: "1.0.0"
    category: cs-ops
    owner: cs-ops
    summary: >
      Audits CRM and CS Platform data quality across completeness, staleness, and
      consistency dimensions. Produces a field-level scorecard and prioritized
      remediation backlog. Never writes to source systems — all fixes are proposals.
    intended_tasks:
      - Weekly or monthly data quality audit
      - Pre-QBR data hygiene check
      - Field-specific completeness investigation
      - Identifying data inconsistencies across systems
    out_of_scope:
      - Applying corrections autonomously
      - CRM structural changes or field definitions
    invocation_cues:
      - "data quality"
      - "CRM hygiene"
      - "missing fields"
      - "stale data"
      - "data audit"
    anti_cues:
      - Revenue-side CRM hygiene (use rev-ops.crm-hygiene-audit)
    priority: standard
    argument_hint: "[--full | --completeness | --staleness | --consistency | --field <name>]"
    required_context:
      - cs-ops CLAUDE.md
    consumes_files:
      - cs-ops/CLAUDE.md
    produces_artifacts:
      - Field-level quality scorecard
      - Remediation backlog (proposals only)
    tools_used:
      - CRM connector (optional)
      - CS Platform connector (optional)
    related_skills:
      - rev-ops.crm-hygiene-audit
      - rev-ops.duplicate-detection
    execution_profile:
      pre_flight: reads cs-ops CLAUDE.md
      connector_behavior: falls back to manual input without connectors
    constraints:
      - Read-only — no autonomous writes to CRM or CS Platform
    risk_level: low
    approval_needed: false
    success_criteria:
      - Quality score per dimension computed
      - Remediation backlog prioritized by impact
    known_failure_modes:
      - Without connectors, audit scope is limited to user-supplied data

  - id: cs-ops.health-model-review
    name: health-model-review
    version: "1.0.0"
    category: cs-ops
    owner: cs-ops
    summary: >
      Audits the portfolio health model for distribution anomalies, calibration drift,
      and component weight validity. Surfaces whether the model is accurately predicting
      risk and recommends recalibration when distributions are skewed.
    intended_tasks:
      - Quarterly health model calibration review
      - Distribution audit (too many Green, skewed Red)
      - Component weight audit
      - Full health model assessment
    out_of_scope:
      - Individual account health review (use csm.health-score-review)
      - Health score changes without CS leadership approval
    invocation_cues:
      - "health model"
      - "calibrate health scores"
      - "health distribution"
      - "too many green accounts"
      - "health model weights"
    anti_cues:
      - Single account health review (use csm.health-score-review)
    priority: standard
    argument_hint: "[--distribution | --calibration | --component-audit | --full]"
    required_context:
      - cs-ops CLAUDE.md
      - Portfolio health data
    consumes_files:
      - cs-ops/CLAUDE.md
    produces_artifacts:
      - Distribution analysis report
      - Calibration recommendations
      - Component weight audit
    tools_used:
      - CS Platform connector (optional)
    related_skills:
      - csm.health-score-review
      - cs-ops.segment-analyzer
    execution_profile:
      pre_flight: reads cs-ops CLAUDE.md
      connector_behavior: falls back to manual data input
    constraints:
      - Recommendations only — model changes require CS leadership sign-off
    risk_level: low
    approval_needed: false
    success_criteria:
      - Distribution analysis completed
      - Calibration drift identified and quantified
    known_failure_modes:
      - Small portfolio (< 20 accounts) produces statistically unreliable distribution analysis

