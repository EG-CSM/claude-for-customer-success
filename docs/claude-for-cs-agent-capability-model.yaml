      weighted dimensions: activity recency (25%), stakeholder coverage (25%),
      stage-age ratio (20%), competitive signal (15%), rep forecast accuracy (15%).
      Scores below 50 trigger next-best-action recommendation. Output is analytical
      input only (G5); never edits CRM (G9).
