  - id: onboarding.success-criteria
    name: success-criteria
    version: "1.0.0"
    category: onboarding
    owner: onboarding
    summary: >
      Define, refine, and track onboarding success criteria with the customer.
      Produces a structured success criteria document — typically 3–5 measurable
      outcomes the customer commits to achieving by end of onboarding. Reads
      criteria format, review cadence, and methodology from the onboarding profile.
    intended_tasks:
      - Criteria definition session from scratch (--define, default)
      - Adjust existing criteria after scope change (--refine)
      - Progress assessment against confirmed criteria (--review)
      - Customer-facing summary without internal notes (--export)
    out_of_scope:
      - Revenue or expansion metrics (use renewals or rev-ops skills)
      - Full onboarding plan (use onboarding-plan)
    invocation_cues:
      - "success criteria"
      - "define outcomes"
      - "customer outcomes"
      - "onboarding goals"
    anti_cues:
      - TtV performance analysis (use ttv-analysis)
      - Graduation readiness (use handoff-doc --readiness)
    priority: standard
    argument_hint: "[<account-name-or-ID>] [--define | --refine | --review | --export]"
    required_context:
      - onboarding CLAUDE.md (criteria format, review cadence, methodology)
    consumes_files:
      - onboarding/CLAUDE.md
    produces_artifacts:
      - Structured success criteria document (--define)
      - Refined criteria with change log (--refine)
      - Progress assessment against criteria (--review)
      - Customer-facing criteria summary (--export)
    tools_used:
      - CRM connector (optional)
    related_skills:
      - onboarding.onboarding-plan
      - onboarding.handoff-doc
    execution_profile:
      pre_flight: reads onboarding CLAUDE.md; routes to cold-start-interview if missing
      connector_behavior: CRM used for account context; falls back to manual input
    constraints:
      - Criteria are 3–5 measurable outcomes; more requires profile override
      - Internal review notes excluded from --export output
    risk_level: low
    approval_needed: false
    success_criteria:
      - Criteria document contains 3–5 measurable customer-agreed outcomes
      - Progress assessment maps each criterion to current evidence (--review)
    known_failure_modes:
      - Criteria format not configured — uses generic template
      - Customer declines measurable outcomes — document flagged for CSM review

  - id: onboarding.ttv-analysis
    name: ttv-analysis
    version: "1.0.0"
    category: onboarding
    owner: onboarding
    summary: >
      Time-to-value analysis for onboarding performance — single account or portfolio.
      Reads TtV targets by segment and milestone framework from the onboarding profile.
      Analyzes actual milestone completion dates against targets to surface pace signals
      and produce recommendations for accounts running behind. All TtV outputs are
      labeled as internal planning targets — never customer commitments.
    intended_tasks:
      - Single-account TtV assessment (--account, default)
      - Comparative TtV view across closed or active onboarding accounts (--portfolio)
      - Common delay pattern identification with intervention recommendations (--patterns)
    out_of_scope:
      - Presenting TtV data to customers as commitments
      - Modifying PM connector data
    invocation_cues:
      - "time to value"
      - "TtV"
      - "onboarding pace"
      - "behind on onboarding"
      - "delay patterns"
    anti_cues:
      - Real-time milestone status (use milestone-tracker)
      - Blocker diagnosis (use blocker-review)
    priority: standard
    argument_hint: "[<account-name-or-ID>] [--account | --portfolio | --patterns]"
    required_context:
      - onboarding CLAUDE.md (TtV targets by segment, milestone framework)
    consumes_files:
      - onboarding/CLAUDE.md
    produces_artifacts:
      - TtV assessment with pace rating and variance (--account)
      - Portfolio TtV comparison table (--portfolio)
      - Delay pattern report with intervention recommendations (--patterns)
    tools_used:
      - PM connector (optional — actual milestone dates)
      - CRM connector (optional — segment classification)
    related_skills:
      - onboarding.milestone-tracker
      - onboarding.blocker-review
    execution_profile:
      pre_flight: reads onboarding CLAUDE.md; routes to cold-start-interview if missing
      connector_behavior: PM connector for actual dates; falls back to CSM input
    constraints:
      - All TtV outputs labeled as internal planning targets — not customer commitments
      - Targets sourced from profile; no hardcoded benchmarks
    risk_level: low
    approval_needed: false
    success_criteria:
      - Variance from TtV target computed and classified (on-track / at-risk / delayed)
      - Delay pattern report identifies top 3 factors with recommended interventions (--patterns)
    known_failure_modes:
      - TtV targets not configured by segment — analysis uses generic single-tier target
      - Milestone dates unavailable from PM — analysis relies on CSM recall

    # ── RENEWALS DOMAIN ──────────────────────────────────────────────────────────

  - id: renewals.churn-rca
    name: churn-rca
    version: "1.0.0"
    category: renewals
    owner: renewals-manager
    summary: >
      Root-cause analysis of full cancellation (churn) events. Identifies why an
      account churned, which signals were present and missed, and what process or
      product changes would reduce recurrence. Scoped to full cancellations only —
      contract contractions route to renewals.downgrade-analysis.
    intended_tasks:
      - Post-churn retrospective for a single churned account
      - Portfolio-level churn pattern scan across multiple lost accounts
      - Quick signal audit to identify earliest missed warning
    out_of_scope:
      - Active at-risk accounts (use renewals.risk-assessment)
      - Contract contractions or downgrades (use renewals.downgrade-analysis)
      - Expansion or renewal forecasting
      - Win-loss analysis for new logos (sales domain)
    invocation_cues:
      - "why did [account] churn"
      - "churn RCA"
      - "post-mortem on lost account"
      - "what signals did we miss"
      - "churn retrospective"
      - "--portfolio-scan"
    anti_cues:
      - Account is still active — route to renewals.risk-assessment
      - Account contracted but did not cancel — route to renewals.downgrade-analysis
      - Request is about renewal probability — route to renewals.renewal-forecast
    priority: high
    argument_hint: "[<account-name-or-ID>] [--deep | --quick | --portfolio-scan]"
    required_context:
      - Domain CLAUDE.md (reads at startup; routes to cold-start-interview if missing)
      - Account name or ID, or list for portfolio scan
      - CRM data or manual input: contract end date, ARR, churn reason, last meaningful contact
      - Support history summary (optional but improves accuracy)
    consumes_files:
      - renewals/CLAUDE.md
      - company-profile.md
    produces_artifacts:
      - Churn root-cause report (structured markdown)
      - Signal timeline (earliest-to-latest warning indicators)
      - Process gap recommendations
    tools_used:
      - CRM connector (Salesforce/HubSpot — optional; falls back to manual input)
    related_skills:
      - renewals.risk-assessment
      - renewals.downgrade-analysis
      - renewals.renewal-forecast
      - renewals.cold-start-interview
    execution_profile:
      steps: 4-7
      token_estimate: 800-1400
      latency: moderate
    constraints:
      - Account content is confidential — no cross-account data sharing in outputs
      - CRM data older than 7 days triggers freshness warning
      - Portfolio scan limited to accounts explicitly provided; no CRM bulk export without authorization
    risk_level: high
    approval_needed: false
    success_criteria:
      - Root cause classified to at least one of five signal domains
      - Earliest detectable signal identified with approximate date
      - At least one actionable process or product recommendation produced
    known_failure_modes:
      - Insufficient account history → superficial root cause; prompt for more data
      - Multiple simultaneous causes conflated → force priority ranking
      - Portfolio scan without consistent data fields → flag gaps before analysis

  - id: renewals.cold-start-interview
    name: cold-start-interview
    version: "1.0"
    category: renewals
    owner: renewals-manager

    summary: >
      Configuration skill (config_skill). Conducts the renewals domain onboarding
      interview, populates renewals/CLAUDE.md, and optionally updates the shared
      company-profile.md. All other renewals skills read CLAUDE.md at startup;
      this skill creates and maintains that file.
    intended_tasks:
      - First-time renewals domain setup
      - Updating specific CLAUDE.md sections without full redo
      - Checking current configuration state
      - Validating integration connector status
    out_of_scope:
      - Non-renewals domain configuration (each domain has its own cold-start-interview)
      - Executing any renewals workflow (configure first, then run skills)

    invocation_cues:
      - "set up renewals"
      - "configure the renewals domain"
      - "run renewals onboarding"
      - "update renewals config"
      - "--check-integrations"
      - "--redo-company-profile"
    anti_cues:
      - User wants to run a renewals workflow, not configure — check CLAUDE.md first
    priority: critical
    argument_hint: "[--full | --quick | --redo | --check-integrations | --redo-company-profile | --section <name>]"

    required_context:
      - None required at invocation — skill elicits all needed context via interview
      - Checks for existing company-profile.md before asking company-level questions
    consumes_files:
      - renewals/CLAUDE.md (existing, if present)
      - company-profile.md (shared, if present)
    produces_artifacts:
      - renewals/CLAUDE.md (created or updated)
      - company-profile.md (created or updated, if --redo-company-profile or first run)

    tools_used:
      - CRM connector (Salesforce/HubSpot — optional; validates connection during --check-integrations)
    related_skills:
      - renewals.customize (targeted updates post-interview)
      - All other renewals skills (consume CLAUDE.md produced here)
    execution_profile:
      steps: 8-12
      token_estimate: 600-1200
      latency: moderate

    constraints:
      - Must complete before any other renewals skill can execute reliably
      - --redo overwrites CLAUDE.md; warn user before executing
      - Company-profile.md changes affect all domains — confirm scope before writing
    risk_level: low
    approval_needed: false

    success_criteria:
      - renewals/CLAUDE.md written with all 8 sections populated (no placeholder values)
      - company-profile.md created or confirmed current
      - User confirms configuration is accurate before skill exits
    known_failure_modes:
      - User skips questions → placeholder values persist → downstream skills route back here
      - CRM connector unavailable → manual input path activated; flag in CLAUDE.md
      - --section targets non-existent section → list valid section names and reprompt

  - id: renewals.contract-review
    name: contract-review
    version: "1.0"
    category: renewals
    owner: renewals-manager

    summary: >
      Extracts and risk-flags key contract terms across eight categories. Applies
      a 🟢/🟡/🔴 risk system; MFN clauses always trigger 🔴 + Legal escalation.
      Must run before negotiation-prep and price-increase-prep for any account.
    intended_tasks:
      - Pre-renewal contract term extraction
      - Risk flagging of non-standard terms
      - Pre-negotiation brief preparation
      - Price protection and MFN clause identification
    out_of_scope:
      - Legal advice or binding legal interpretation
      - Contract redlining or drafting (Legal team function)
      - New logo contract review (sales domain)

    invocation_cues:
      - "review the contract for [account]"
      - "what are the renewal terms"
      - "check for MFN clause"
      - "price protection check"
      - "--extract"
      - "--flag"
      - "--summary"
    anti_cues:
      - Request is for legal advice — route to Legal
      - User wants negotiation strategy without contract terms — run this first
    priority: high
    argument_hint: "[<account-name-or-ID>] [--extract | --flag | --summary]"

    required_context:
      - Domain CLAUDE.md
      - Contract document (PDF, text, or pasted content)
      - Account name or ID
    consumes_files:
      - renewals/CLAUDE.md
      - Contract document (provided by user)
    produces_artifacts:
      - Contract term extraction table (8 categories)
      - Risk flag summary (🟢/🟡/🔴 by term)
      - Escalation notice (if 🔴 findings present)

    tools_used:
      - File read (contract document)
    related_skills:
      - renewals.negotiation-prep (runs after this; requires output)
      - renewals.price-increase-prep (runs after this for price-protected accounts)
      - renewals.cold-start-interview (domain config pre-flight)
    execution_profile:
      steps: 3-5
      token_estimate: 700-1200
      latency: low-moderate

    constraints:
      - MFN clause detection → always 🔴 + immediate Legal + Head of CS routing (non-negotiable)
      - Output is informational only — not legal advice
      - Non-standard terms require Legal review before negotiation commitment
    risk_level: medium
    approval_needed: false

    success_criteria:
      - All 8 term categories extracted or flagged as not-present
      - Every non-standard term carries a risk color and recommended action
      - MFN escalation triggered if clause detected
    known_failure_modes:
      - Contract not provided → prompt for document; cannot proceed without it
      - Ambiguous language → flag as 🟡 and recommend Legal clarification
      - Incomplete contract (redacted sections) → note gaps in output

  - id: renewals.customize
    name: customize
    version: "1.0"
    category: renewals
    owner: renewals-manager

    summary: >
      Configuration skill (config_skill). Makes targeted updates to renewals/CLAUDE.md
      or company-profile.md without running the full cold-start-interview. Includes
      a validate mode that runs consistency checks across configuration fields.
    intended_tasks:
      - Update a single CLAUDE.md field (e.g., discount floor, escalation SLA)
      - Edit company-profile.md company-level fields
      - Validate current configuration for internal consistency
      - Show current configuration without editing
    out_of_scope:
      - First-time setup (use cold-start-interview)
      - Executing renewals workflows (this is config-only)

    invocation_cues:
      - "update the renewals config"
      - "change the discount floor"
      - "update my escalation SLA"
      - "show current config"
      - "validate config"
      - "--show"
      - "--edit"
      - "--validate"
    anti_cues:
      - No CLAUDE.md exists yet — route to cold-start-interview
      - User wants to run a renewal workflow, not configure
    priority: medium
    argument_hint: "[--show | --edit <field> <value> | --validate]"

    required_context:
      - renewals/CLAUDE.md (must exist; routes to cold-start-interview if not found)
      - company-profile.md (for company-level field edits)
    consumes_files:
      - renewals/CLAUDE.md
      - company-profile.md
    produces_artifacts:
      - Updated renewals/CLAUDE.md (--edit mode)
      - Updated company-profile.md (--edit company fields)
      - Consistency report (--validate mode)

    tools_used: []
    related_skills:
      - renewals.cold-start-interview (full setup; prerequisite)
      - All renewals skills (consume updated CLAUDE.md)
    execution_profile:
      steps: 2-4
      token_estimate: 300-600
      latency: low

    constraints:
      - --validate checks four consistency rules: GRR/NRR inversion, discount floor vs anchor, escalation SLA vs renewal window, strategic threshold vs deal size
      - Edits to company-profile.md affect all domains — confirm scope before writing
      - Cannot create CLAUDE.md if missing — routes to cold-start-interview
    risk_level: low
    approval_needed: false

    success_criteria:
      - Target field updated with new value and confirmed by user
      - --validate produces pass/fail for all four consistency checks with remediation hints
      - --show renders current config in readable format
    known_failure_modes:
      - Field name not recognized → list valid field names and reprompt
      - --validate finds GRR/NRR inversion → block edit until resolved; explain impact
      - company-profile.md conflict with domain CLAUDE.md → surface both values and ask which wins

  - id: renewals.downgrade-analysis
    name: downgrade-analysis
    version: "1.0.0"
    category: renewals
    owner: renewals-manager
    summary: >
      Contract contraction analysis for accounts requesting seat reduction or scope
      reduction. Diagnoses contraction drivers, quantifies ARR impact, and produces
      counter-proposal inputs for the negotiation-prep workflow. Scoped to contract
      contractions only — full cancellations route to renewals.churn-rca.
    intended_tasks:
      - Analyze a customer request to reduce seats, tiers, or product scope
      - Quantify ARR impact of proposed contraction
      - Generate counter-proposal framing for negotiation
      - Identify whether contraction reflects temporary budget pressure or structural disengagement
    out_of_scope:
      - Full cancellations (use renewals.churn-rca)
      - Active at-risk accounts not yet requesting contraction (use renewals.risk-assessment)
      - Renewal forecasting (use renewals.renewal-forecast)
      - Expansion or upsell opportunities
    invocation_cues:
      - "customer wants to reduce seats"
      - "they're asking to downgrade"
      - "contraction request"
      - "scope reduction"
      - "downgrade analysis"
      - "they want to cut the contract"
    anti_cues:
      - Account wants to cancel entirely — route to renewals.churn-rca
      - No contraction request yet — route to renewals.risk-assessment
      - Request is about renewal probability — route to renewals.renewal-forecast
    priority: high
    argument_hint: "[<account-name-or-ID>] [--seats | --scope | --tier]"
    required_context:
      - Domain CLAUDE.md (reads at startup; routes to cold-start-interview if missing)
      - Account name or ID
      - Current contract: ARR, seat count, tier, renewal date
      - Requested contraction: seats to reduce or scope to remove
      - CRM data or manual input: engagement history, usage data, support history
    consumes_files:
      - renewals/CLAUDE.md
      - company-profile.md
    produces_artifacts:
      - Contraction analysis report (structured markdown)
      - ARR impact summary (current vs. proposed)
      - Counter-proposal inputs for renewals.negotiation-prep
    tools_used:
      - CRM connector (Salesforce/HubSpot — optional; falls back to manual input)
    related_skills:
      - renewals.churn-rca
      - renewals.risk-assessment
      - renewals.negotiation-prep
      - renewals.renewal-forecast
    execution_profile:
      steps: 3-5
      token_estimate: 600-1100
      latency: moderate
    constraints:
      - Account content is confidential — no cross-account data sharing in outputs
      - CRM data older than 7 days triggers freshness warning
      - ARR figures flagged as not-yet-a-revenue-commitment until signed amendment
    risk_level: medium
    approval_needed: false
    success_criteria:
      - Contraction drivers classified (budget, value gap, usage reduction, or structural disengagement)
      - ARR impact quantified for proposed vs. alternative contraction scenarios
      - Counter-proposal inputs produced for negotiation-prep handoff
    known_failure_modes:
      - Insufficient usage data → flag gap and request before analysis
      - Contraction request conflated with cancellation intent → clarify scope before proceeding
      - No current contract data provided → prompt for ARR, seat count, and renewal date

  - id: renewals.executive-summary
    name: executive-summary
    version: "1.0"
    category: renewals
    owner: renewals-manager

    summary: >
      Produces a structured executive-facing account summary for renewal conversations
      with senior stakeholders. Three modes: brief (1-page CRO/weekly), full (extended
      with competitive context and exec engagement plan), board (board/investor format,
      strips relationship detail). ARR figures always flagged as not-yet-a-revenue-commitment.
    intended_tasks:
      - Pre-call brief for CRO or VP CS on a renewal account
      - Board or investor update on strategic accounts
      - Full account narrative for QBR executive prep
    out_of_scope:
      - Detailed negotiation positioning (use negotiation-prep)
      - Risk tier calculation (import from risk-assessment; never re-derive here)
      - Customer-facing documents (this is internal)

    invocation_cues:
      - "executive summary for [account]"
      - "CRO brief on [account]"
      - "board update for [account]"
      - "prep exec for renewal call"
      - "--brief"
      - "--full"
      - "--board"
    anti_cues:
      - User wants negotiation tactics — route to negotiation-prep
      - User wants risk tier calculation — run risk-assessment first
    priority: high
    argument_hint: "[<account-name-or-ID>] [--brief | --full | --board]"

    required_context:
      - Domain CLAUDE.md
      - Risk tier from risk-assessment (must be pre-run; not re-derived here)
      - Account ARR, contract end date, key stakeholders
      - Recent engagement notes or CRM activity
    consumes_files:
      - renewals/CLAUDE.md
      - risk-assessment output (risk tier import)
    produces_artifacts:
      - Executive summary document (mode-appropriate length and format)
      - Bottom line (2 sentences)
      - Commercial status table
      - Relationship health summary
      - Risk summary (imported tier)
      - Recommended executive action with named ask (person/action/date)

    tools_used:
      - CRM connector (optional; falls back to manual input)
    related_skills:
      - renewals.risk-assessment (tier import — must run first)
      - renewals.negotiation-prep (separate artifact; not combined here)
      - renewals.cold-start-interview (domain config pre-flight)
    execution_profile:
      steps: 4-6
      token_estimate: 700-1300
      latency: moderate

    constraints:
      - All ARR figures flagged "[review — not yet a revenue commitment]"
      - Risk tier imported from risk-assessment; never re-derived in this skill
      - Executive asks must name specific person, specific action, specific date — no vague asks
      - Board format requires explicit user authorization before generating
      - Value claims require account-specific evidence — no generic benefit statements
    risk_level: medium
    approval_needed: true  # board mode only

    success_criteria:
      - Bottom line produced in ≤2 sentences
      - Commercial status table accurate to provided data
      - Named executive ask with person/action/date included
      - ARR commitment language applied to all figures
    known_failure_modes:
      - risk-assessment not pre-run → block generation; prompt user to run it first
      - Executive ask lacks specificity → force clarification before finalizing
      - Board mode without authorization → refuse and explain requirement

  - id: renewals.expansion-signal
    name: expansion-signal
    version: "1.0"
    category: renewals
    owner: renewals-manager

    summary: >
      Detects and qualifies expansion opportunities within the existing customer base.
      Six signal types across three qualification tiers. AE routing is mandatory at
      Qualified tier. Expansion never included in GRR; tracked separately.
    intended_tasks:
      - Identify expansion signals before or during renewal cycle
      - Qualify expansion opportunity to Pipeline-ready or Qualified tier
      - Catalog all detectable signal types for the configured pricing model
    out_of_scope:
      - New logo expansion (sales domain)
      - GRR forecasting (expansion excluded by definition)
      - Accounts with active churn risk — run risk-assessment first

    invocation_cues:
      - "find expansion opportunities"
      - "expansion signals for [account]"
      - "upsell audit"
      - "growth signals"
      - "--deep"
      - "--quick"
      - "--catalog"
    anti_cues:
      - Account has active churn risk — resolve risk before expansion pursuit
      - User wants forecast with expansion in GRR — expansion excluded from GRR
    priority: high
    argument_hint: "[<account-name-or-ID>] [--deep | --quick | --catalog]"

    required_context:
      - Domain CLAUDE.md
      - Account usage data or summary
      - Pricing model configuration (seat, usage-based, or hybrid)
      - Risk-assessment output if any churn risk signals present
    consumes_files:
      - renewals/CLAUDE.md
      - risk-assessment output (if churn risk flagged)
    produces_artifacts:
      - Expansion signal report (detected signals with qualification tier)
      - AE routing notice (if Qualified tier reached)
      - ARR potential estimate (Low Confidence — flagged)

    tools_used:
      - CRM connector (optional; product usage data if available)
    related_skills:
      - renewals.risk-assessment (must check first if churn risk present)
      - renewals.negotiation-prep (downstream if expansion pursued)
      - renewals.renewal-forecast (NRR includes Qualified expansion in pipeline)
      - renewals.cold-start-interview (domain config pre-flight)
    execution_profile:
      steps: 4-8
      token_estimate: 600-1200
      latency: moderate

    constraints:
      - Expansion ARR potential estimates flagged "[Low Confidence]" — not revenue commitments
      - AE routing mandatory when opportunity reaches Qualified tier (non-negotiable)
      - Renewal risk must be addressed before expansion pursuit; skill blocks if active Critical risk
      - Expansion never in GRR calculation
    risk_level: low
    approval_needed: false

    success_criteria:
      - All applicable signal types assessed for configured pricing model
      - Each detected signal assigned to Early signal / Pipeline-ready / Qualified tier
      - AE routing triggered if Qualified reached
    known_failure_modes:
      - Usage data unavailable → proceed with relationship signals only; flag data gap
      - Active Critical risk → block expansion pursuit; redirect to risk-assessment
      - Usage-based signals attempted on seat-only pricing model → skip gracefully

  - id: renewals.negotiation-prep
    name: negotiation-prep
    version: "1.0"
    category: renewals
    owner: renewals-manager

    summary: >
      Prepares the renewals manager for a contract negotiation. Produces an internal
      brief (anchor, floor, top objections) and optionally a clean customer-facing
      export proposal. Requires contract-review output as input. Three locked numbers
      (anchor, first concession, walk-away) must be confirmed before any negotiation call.
    intended_tasks:
      - Pre-call negotiation brief preparation
      - Objection bank construction
      - Multi-scenario offer modeling
      - Clean customer-facing proposal export
    out_of_scope:
      - Contract review (must run contract-review first)
      - Executive positioning (use executive-summary)
      - Price increase communications (use price-increase-prep)

    invocation_cues:
      - "negotiation prep for [account]"
      - "prep for renewal call"
      - "objection handling for [account]"
      - "build negotiation brief"
      - "--brief"
      - "--full"
      - "--export"
    anti_cues:
      - Contract not yet reviewed — run contract-review first
      - User wants executive summary — that is a separate artifact
    priority: high
    argument_hint: "[<account-name-or-ID>] [--brief | --full | --export]"

    required_context:
      - Domain CLAUDE.md
      - contract-review output (required; blocks if not present)
      - Account ARR, risk tier, key stakeholders
      - Discount authority ceiling from CLAUDE.md
    consumes_files:
      - renewals/CLAUDE.md
      - contract-review output
      - risk-assessment output (for risk tier context)
    produces_artifacts:
      - Negotiation brief (internal: opening position, walk-away, authority ceiling, top objections, recommended opening, pre-call checklist)
      - Customer-facing export proposal (--export mode only; fully suppresses internal content)

    tools_used:
      - CRM connector (optional)
    related_skills:
      - renewals.contract-review (prerequisite; must run first)
      - renewals.risk-assessment (risk tier context)
      - renewals.expansion-signal (if expansion in scope)
      - renewals.executive-summary (separate artifact)
      - renewals.cold-start-interview (domain config pre-flight)
    execution_profile:
      steps: 4-7
      token_estimate: 700-1400
      latency: moderate

    constraints:
      - Three locked numbers (anchor, first concession, walk-away) required before any call
      - Walk-away floor is not an opening offer — never present it as one
      - Non-standard contract terms → Legal review required before committing
      - --export mode fully suppresses all internal positioning, floor, and authority data
      - No fabricated competitor intelligence — only verified data included
      - Discount authority check on every scenario — ceiling from CLAUDE.md
      - contract-review must have run first; skill blocks without it
    risk_level: high
    approval_needed: false

    success_criteria:
      - Three locked numbers confirmed and documented in brief
      - Top 3 objections with responses included
      - --export produces clean proposal with zero internal data leakage
      - Discount ceiling respected in all scenarios
    known_failure_modes:
      - contract-review output missing → block; require it before proceeding
      - Competitor data requested without source → refuse fabrication; use verified data only
      - Discount scenario exceeds authority ceiling → flag and require escalation path

  - id: renewals.price-increase-prep
    name: price-increase-prep
    version: "1.0"
    category: renewals
    owner: renewals-manager

    summary: >
      Prepares a price increase plan for one account or a multi-account cohort.
      Produces internal plan, optional customer-facing draft notice, and objection
      handling prep. Approval must precede customer communication (non-negotiable).
      Five increase types supported; at-risk accounts require risk-assessment first.
    intended_tasks:
      - Price increase plan for a single account
      - Cohort rollout table for multi-account price increase
      - Customer-facing notice draft (after plan approval)
      - Objection handling prep for price increase conversations
    out_of_scope:
      - Negotiation strategy (use negotiation-prep)
      - Contract review for price-protected terms (run contract-review first)
      - Discount modeling (separate from price increase logic)

    invocation_cues:
      - "price increase for [account]"
      - "plan a rate increase"
      - "cohort price increase"
      - "draft price increase notice"
      - "--plan"
      - "--draft"
      - "--objections"
      - "--cohort"
    anti_cues:
      - Account is at-risk — run risk-assessment first
      - Price protection in contract — run contract-review first
      - User wants to draft notice before plan is approved — block; plan first
    priority: high
    argument_hint: "[<account-name-or-ID> | --cohort] [--plan | --draft | --objections]"

    required_context:
      - Domain CLAUDE.md
      - Account ARR, contract end date, current rate
      - Risk-assessment output if at-risk signals present
      - contract-review output if price-protected account
      - Approval status (required before --draft)
    consumes_files:
      - renewals/CLAUDE.md
      - risk-assessment output (if at-risk)
      - contract-review output (if price-protected)
    produces_artifacts:
      - Price increase plan (internal; approval status, rationale, timing, objection prep)
      - Customer-facing draft email (--draft mode; after plan approval only)
      - Cohort rollout table (--cohort mode)

    tools_used:
      - CRM connector (optional; for cohort account list)
    related_skills:
      - renewals.contract-review (prerequisite for price-protected accounts)
      - renewals.risk-assessment (prerequisite for at-risk accounts)
      - renewals.negotiation-prep (downstream if increase triggers negotiation)
      - renewals.cold-start-interview (domain config pre-flight)
    execution_profile:
      steps: 4-8
      token_estimate: 600-1300
      latency: moderate

    constraints:
      - Approval required before any customer communication — non-negotiable
      - No value claims without account-specific evidence
      - Inside 30 days of renewal = high-risk; consult Head of CS before proceeding
      - Revenue commitment language on all ARR figures
      - --draft only available after --plan confirms approval
      - At-risk accounts: risk-assessment required first
      - Price-protected accounts: contract-review required first
    risk_level: high
    approval_needed: true

    success_criteria:
      - Plan includes increase type classification, approval status, rationale, and timing recommendation
      - --draft produces clean customer email with no internal pricing logic exposed
      - Cohort table covers all accounts in scope with consistent fields
    known_failure_modes:
      - --draft requested without --plan approval → block; explain sequence
      - At-risk account without risk-assessment → block; require pre-flight
      - Inside 30 days of renewal → escalate to Head of CS; do not proceed autonomously

  - id: renewals.renewal-forecast
    name: renewal-forecast
    version: "1.0"
    category: renewals
    owner: renewals-manager

    summary: >
      Builds a weighted renewal forecast across the full book or a scoped subset.
      Applies five pipeline stage weights, produces three scenarios (best/likely/worst),
      and calculates GRR and NRR correctly. All figures flagged as not-yet-a-revenue-commitment.
      Expansion included in NRR only when Qualified + formal pipeline confirmed.
    intended_tasks:
      - Full book renewal forecast
      - 90/60/30-day cohort forecast
      - Segment-level forecast
      - Single-account pipeline addition
    out_of_scope:
      - Individual account risk assessment (use risk-assessment)
      - Expansion opportunity identification (use expansion-signal)
      - Price increase planning (use price-increase-prep)

    invocation_cues:
      - "renewal forecast"
      - "what's my renewal number"
      - "forecast this quarter's renewals"
      - "GRR forecast"
      - "NRR forecast"
      - "--full"
      - "--cohort"
      - "--segment"
      - "--account"
    anti_cues:
      - User wants individual account risk — route to risk-assessment
      - User wants expansion identification — route to expansion-signal
    priority: high
    argument_hint: "[--full | --cohort 90|60|30 | --segment <name> | --account <name>]"

    required_context:
      - Domain CLAUDE.md
      - Account list with: ARR, pipeline stage, contract end date, risk tier
      - CRM data or manual input
      - Expansion pipeline data (for NRR; only if Qualified + formal pipeline)
    consumes_files:
      - renewals/CLAUDE.md
      - risk-assessment outputs (risk tiers per account)
      - expansion-signal outputs (Qualified expansion only for NRR)
    produces_artifacts:
      - Forecast table (per-account weighted ARR by stage)
      - Three-scenario summary (best/likely/worst)
      - GRR and NRR calculations with formula documentation
      - At-risk accounts with named escalation owners

    tools_used:
      - CRM connector (optional; falls back to manual input)
    related_skills:
      - renewals.risk-assessment (risk tiers required input)
      - renewals.expansion-signal (NRR expansion source)
      - renewals.negotiation-prep (downstream for at-risk accounts)
      - renewals.price-increase-prep (affects ARR inputs)
      - renewals.executive-summary (consumes forecast output)
      - renewals.cold-start-interview (domain config pre-flight)
    execution_profile:
      steps: 5-9
      token_estimate: 800-1500
      latency: moderate-high

    constraints:
      - All ARR figures flagged "[review — not yet a revenue commitment]"
      - Expansion in NRR only when economic buyer qualified + formal pipeline confirmed
      - Expansion never in GRR — formula strictly: (Starting ARR − Churn − Contraction) / Starting ARR
      - Pipeline stage weights: Open 70%, Verbal commitment 90%, At risk 25%, Won 100%, Lost 0%
      - At-risk accounts require named escalation owner in output
      - CRM data older than 7 days triggers freshness warning
      - No fabricated ARR figures
    risk_level: high
    approval_needed: false

    success_criteria:
      - GRR and NRR calculated with correct formulas and documented
      - Three scenarios produced with stage-weight assumptions stated
      - Every at-risk account has named escalation owner
      - Revenue commitment language applied to all figures
    known_failure_modes:
      - Expansion included in GRR → block; flag formula error and correct
      - CRM data stale → apply freshness warning; do not suppress data
      - At-risk account missing escalation owner → require it before finalizing forecast

  - id: renewals.risk-assessment
    name: risk-assessment
    version: "1.0"
    category: renewals
    owner: renewals-manager

    summary: >
      Assesses renewal risk for a single account or a portfolio batch. Scores across
      five signal domains, assigns a risk tier (Critical/High/Medium/Low), and triggers
      mandatory escalation protocols for Critical-tier accounts. Health scores are inputs,
      not verdicts. Auto-escalate triggers are non-negotiable.
    intended_tasks:
      - Pre-renewal risk tier assignment for a single account
      - Multi-account triage for pipeline review prep
      - Quick 3-domain risk check for time-sensitive situations
    out_of_scope:
      - Post-churn retrospective (use renewals.churn-rca)
      - Expansion opportunity identification (use expansion-signal)
      - Forecast construction (use renewal-forecast)

    invocation_cues:
      - "risk assessment for [account]"
      - "how at-risk is [account]"
      - "triage my renewal pipeline"
      - "risk check before renewal call"
      - "--deep"
      - "--quick"
      - "--triage"
    anti_cues:
      - Account has already churned — route to renewals.churn-rca
      - User wants expansion signals — route to expansion-signal
    priority: critical
    argument_hint: "[<account-name-or-ID>] [--deep | --quick | --triage]"

    required_context:
      - Domain CLAUDE.md
      - Account name or ID (or list for --triage)
      - Usage data, engagement history, support tickets, commercial signals
      - CRM data or manual input
    consumes_files:
      - renewals/CLAUDE.md
    produces_artifacts:
      - Risk tier assignment (Critical/High/Medium/Low) with evidence
      - Signal summary by domain (5 domains assessed)
      - Escalation notice with owner, channel, and SLA (if Critical)
      - Triage table (--triage mode; all accounts with tier and top signal)

    tools_used:
      - CRM connector (optional; falls back to manual input)
    related_skills:
      - renewals.churn-rca (post-churn analog)
      - renewals.expansion-signal (expansion only after risk resolved)
      - renewals.renewal-forecast (tier imported into forecast)
      - renewals.negotiation-prep (risk context required)
      - renewals.executive-summary (tier imported; not re-derived)
      - renewals.cold-start-interview (domain config pre-flight)
    execution_profile:
      steps: 4-8
      token_estimate: 700-1400
      latency: moderate

    constraints:
      - Health scores are inputs not verdicts — tier derives from red flag count and auto-escalate triggers
      - Auto-escalate triggers are non-negotiable: non-renewal notice OR ≥2 auto-escalate signals OR exec sponsor departed + competitor confirmed → always Critical
      - Escalation always names owner, channel, and SLA — no anonymous escalations
      - Discount authority check on every save offer scenario
      - Account content confidential — no cross-account data sharing
      - CRM data older than 7 days triggers freshness warning
    risk_level: high
    approval_needed: false

    success_criteria:
      - Tier assigned with supporting evidence from signal domains
      - Auto-escalate triggers checked and applied correctly
      - Critical-tier accounts produce named escalation notice before skill exits
    known_failure_modes:
      - Health score treated as tier without red flag count → correct; re-derive from signals
      - Auto-escalate trigger present but tier set to High → block; force Critical
      - Escalation owner not named → require it; do not produce anonymous escalation
      - CRM data stale → apply freshness warning; proceed with caveat


# ============================================================
