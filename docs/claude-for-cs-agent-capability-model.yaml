  - id: rev-ops.revenue-leakage-scanning
    name: revenue-leakage-scanning
    version: 1.0.0
    domain: rev-ops
    category: deal-intelligence
    owner: rev-ops-lead

    summary: >
      Identifies deal structures leaving money on the table before close. Detects four
      leakage patterns: underpriced professional services, missing expansion clauses in
      multi-year deals, renewal terms misaligned with ARR classification, and missing
      success milestone gates. Primary detection window is Negotiation stage — before
      close locks the structure.

    intended_tasks:
      - Scan a specific deal for structural revenue leakage before contract signing
      - Identify missing expansion clause on multi-year deals
      - Flag PS pricing against deal complexity and estimated impact

    out_of_scope:
      - Post-close contract renegotiation (flagged as lower-value window)
      - ARR forecasting or pipeline coverage (route to relevant skills)

    invocation_cues:
      - "revenue leakage"
      - "missing expansion clause"
      - "mispriced services"
      - "deal structure review"
      - "are we leaving money on the table"

    anti_cues:
      - Pipeline coverage analysis (route to pipeline-coverage-analysis)
      - CRM hygiene issues (route to crm-hygiene-audit)

    priority: standard
    argument_hint: "Account name or deal ID; stage context"

    required_context:
      - HubSpot deal fields, product configuration, and notes for target deal
      - avg_deal_acv, primary_segment from company profile

    consumes_files:
      - reference/revops-domain-model.md §2

    produces_artifacts:
      - Leakage scan report per deal (pattern type, estimated impact, action before close)

    tools_used:
      - HubSpot (deal fields, product line, notes)

    related_skills:
      - rev-ops.non-standard-terms-detection
      - rev-ops.deal-desk-workflow-management
      - rev-ops.sales-cs-handoff-quality-scoring

    execution_profile:
      reads_crm: true
      writes_crm: false
      reads_cs_platform: false
      calls_llm: false
      creates_linear_issue: false

    constraints:
      - G1 — leakage estimates require qualification language when shared beyond RevOps
      - Most valuable at Negotiation stage — flag explicitly when run on closed deals
      - Impact estimates are models, not revenue commitments

    risk_level: low
    approval_needed: false

    success_criteria:
      - All four leakage patterns evaluated for target deal
      - Each finding includes pattern type, estimated impact, and specific action before close
      - Window status declared (action window open / deal closed — lower leverage)

    known_failure_modes:
      - Deal notes sparse → flag inability to assess Pattern 4; request AE to populate risk notes
      - Deal already closed → complete scan but surface lower-leverage context prominently

  - id: rev-ops.sales-cs-handoff-quality-scoring
    name: sales-cs-handoff-quality-scoring
    version: 1.0.0
    domain: rev-ops
    category: cross-functional
    owner: rev-ops-lead

    summary: >
      Scores each closed/won deal on five handoff dimensions (0–100). Pass threshold: 80.
      Below-threshold deals trigger a Linear issue assigned to the AE manager with 48-hour
      SLA. CS onboarding proceeds but CSM is notified of open issue. Dimensions: OCV entry
      referenced, trigger match, measurement source accessible, stakeholder map, risk flags
      documented.

    intended_tasks:
      - Score a specific deal or all recent closes on handoff quality
      - Create Linear issue for below-threshold deals with named escalation path
      - Notify CSM of handoff gaps without blocking onboarding

    out_of_scope:
      - Subjective prose quality assessment (scoring is binary per structured dimension)
      - Handoff completion steps beyond scoring and escalation

    invocation_cues:
      - "handoff quality"
      - "handoff score"
      - "what's missing for [deal] handoff"
      - "CS handoff check"
      - "handoff completeness"

    anti_cues:
      - OCV catalog authoring (route to outcome-catalog-entry-builder)
      - CS onboarding execution (route to csm domain skills)

    priority: high
    argument_hint: "Account name, deal ID, or 'recent closes this week'"

    required_context:
      - HubSpot deal fields for target deal(s)
      - OCV catalog (ocv_catalog_path from company profile) — Ratified entries only
      - linear_connected flag from company profile

    consumes_files:
      - reference/revops-domain-model.md §10
      - reference/revops-domain-model.md §9

    produces_artifacts:
      - Handoff quality score per deal (N/100, pass/fail, failed dimensions)
      - Linear issue for below-threshold deals (assigned to AE manager, 48h SLA)
      - CSM notification for below-threshold deals
      - Audit trail entry (timestamp, deal ID, score, failed dimensions, issue number)
      - Weekly digest when run across all recent closes

    tools_used:
      - HubSpot (deal fields read)
      - Linear (issue creation for below-threshold deals)

    related_skills:
      - rev-ops.revenue-leakage-scanning
      - rev-ops.outcome-catalog-entry-builder
      - onboarding domain skills

    execution_profile:
      reads_crm: true
      writes_crm: false
      reads_cs_platform: false
      calls_llm: false
      creates_linear_issue: true

    constraints:
      - G6 — data-as-of required on all reads
      - G7 — every below-threshold flag includes named escalation path (AE manager, 48h SLA)
      - G8 — only Ratified OCV entries count toward D1; Draft entries do not satisfy dimension
      - G9 — no autonomous CRM edits; scoring is read-only

    risk_level: medium
    approval_needed: false

    success_criteria:
      - All five dimensions scored binary per structured field check
      - Linear issue created for any deal scoring < 80 with failed dimensions listed
      - CSM notified with specific gap summary and Linear issue number
      - Audit trail entry written for each deal scored

    known_failure_modes:
      - Linear not connected → surface below-threshold deals in chat; note Linear issue cannot be created
      - OCV catalog not configured → D1 cannot be scored; flag to RevOps and count as FAIL
      - HubSpot fields missing → declare which fields unreadable; score dimension FAIL and note data gap

  - id: rev-ops.scenario-modeling
    name: scenario-modeling
    version: 1.0.0
    domain: rev-ops
    category: planning
    owner: rev-ops-lead

    summary: >
      Builds P10/P50/P90 range forecasts from current pipeline state. Models win rate
      sensitivity, slip scenarios, and enterprise concentration risk. Produces structured
      scenario output consumed by annual-planning-workflow for three-scenario UoG capacity
      modeling.

    intended_tasks:
      - Build downside/base/upside ARR scenarios from current pipeline
      - Model win rate sensitivity (±5pp impact on ARR)
      - Surface enterprise concentration risk when top 3 accounts exceed 30% of pipeline
      - Produce P10/P50/P90 growth percentages for annual-planning-workflow Phase 1

    out_of_scope:
      - Individual deal forecasting (route to deal-health-scoring)
      - Quota modeling (route to quota-sensitivity-analysis)

    invocation_cues:
      - "forecast scenarios"
      - "P10 P50 P90"
      - "range forecast"
      - "what if win rate drops"
      - "downside scenario"
      - "upside scenario"

    anti_cues:
      - Pipeline coverage ratio check (route to pipeline-coverage-analysis)
      - Single-deal forecast (route to deal-health-scoring)

    priority: high
    argument_hint: "Quarter or period; optionally --phase 1 for annual-planning-workflow handoff"

    required_context:
      - HubSpot current pipeline with stage breakdown
      - Win rate history (trailing 4Q) by stage and segment
      - target_growth_pct, nrr_current, primary_segment, ae_quota, ae_attainment_planning_rate from company profile

    consumes_files:
      - reference/revops-domain-model.md §4

    produces_artifacts:
      - Three-scenario table (P10/P50/P90) with ARR, vs-plan, and primary driver
      - Win rate sensitivity table (±5pp impact)
      - Concentration risk flag when top 3 accounts > 30% of pipeline
      - p10/p50/p90_growth_pct fields for annual-planning-workflow handoff

    tools_used:
      - HubSpot (pipeline read, win rate history)

    related_skills:
      - rev-ops.annual-planning-workflow
      - rev-ops.pipeline-coverage-analysis
      - rev-ops.quota-sensitivity-analysis

    execution_profile:
      reads_crm: true
      writes_crm: false
      reads_cs_platform: false
      calls_llm: false
      creates_linear_issue: false

    constraints:
      - G1 — all scenario outputs carry: "This is a range model, not a revenue commitment"
      - G6 — data-as-of timestamp required on all pipeline pulls
      - Present all three scenarios; do not surface only the optimistic one
      - Confirm output destination before delivering

    risk_level: low
    approval_needed: false

    success_criteria:
      - P10/P50/P90 table includes ARR, vs-plan delta, and named primary driver per scenario
      - Win rate sensitivity modeled at ±5pp
      - Concentration risk flag present when applicable
      - When invoked from annual-planning-workflow: p10/p50/p90_growth_pct fields output

    known_failure_modes:
      - HubSpot pipeline unavailable → declare unavailable; do not estimate scenarios from memory
      - Win rate history < 4Q → flag data gap; use stated win rate from company profile with Moderate confidence

  - id: rev-ops.stage-integrity-audit
    name: stage-integrity-audit
    version: 1.0.0
    domain: rev-ops
    category: pipeline-intelligence
    owner: rev-ops-lead

    summary: >
      Detects CRM hygiene issues that distort forecasts: stage-skipping (multi-stage jumps
      in one update), backward movement, and stale stage (stuck > 2x historical avg).
      Produces audit report for human review before any CRM edits. Never updates CRM
      autonomously.

    intended_tasks:
      - Identify deals with retroactive stage-skip entries
      - Flag deals that moved backward (may indicate lost deal not yet closed)
      - Surface stale-stage deals inflating pipeline with unlikely-to-close opportunities

    out_of_scope:
      - Executing CRM stage corrections (G9 — all changes are proposals for human review)
      - Velocity trend analysis (route to pipeline-velocity-tracking)

    invocation_cues:
      - "stage integrity"
      - "stage skipping"
      - "backward movement"
      - "CRM stage hygiene"
      - "stale stage"

    anti_cues:
      - General CRM hygiene (route to crm-hygiene-audit for field completeness)
      - Forecast amount accuracy (route to forecast-variance-analysis)

    priority: standard
    argument_hint: "Quarter scope; optionally filter by rep or segment"

    required_context:
      - HubSpot stage change history (entry/exit dates per deal)
      - avg_sales_cycle_days and historical median by stage from company profile

    consumes_files:
      - reference/revops-domain-model.md §9

    produces_artifacts:
      - Stage integrity audit report (three pattern sections + recommended actions)

    tools_used:
      - HubSpot (stage history read)

    related_skills:
      - rev-ops.pipeline-velocity-tracking
      - rev-ops.crm-hygiene-audit
      - rev-ops.forecast-variance-analysis

    execution_profile:
      reads_crm: true
      writes_crm: false
      reads_cs_platform: false
      calls_llm: false
      creates_linear_issue: false

    constraints:
      - G9 (Write Protocol) — no autonomous CRM edits; all corrections are proposals requiring human confirmation
      - G5 — stage anomalies are signals for manager and CRM admin review
      - G6 — data-as-of required on all stage history reads

    risk_level: low
    approval_needed: false

    success_criteria:
      - All three anomaly patterns (skip, backward, stale) evaluated across scope
      - Each finding includes deal name, pattern detail, rep, and recommended action
      - Recommended actions explicitly flagged as requiring human confirmation before CRM edits

    known_failure_modes:
      - Stage history not available in HubSpot → declare unavailable; cannot complete audit
      - Historical stage median not established (<4Q data) → use avg_sales_cycle_days as proxy; flag as estimate

  - id: rev-ops.unit-of-growth-calculator
    name: unit-of-growth-calculator
    version: 1.0.0
    domain: rev-ops
    category: planning
    owner: rev-ops-lead

    summary: >
      Computes GTM headcount requirements, capacity imbalances, and efficiency diagnostics
      for B2B SaaS organizations using the AE-anchored or CSM-anchored pod model. Synthesizes
      SuccessCOACHING Unit of Growth research with 2025 SaaS benchmarks. Works forward
      (revenue targets → headcount) or reverse (current headcount → max supportable ARR).
      Surfaces five imbalance signals across AE, SDR, CSM, and Support functions.

    intended_tasks:
      - Model GTM headcount requirements from ARR target and segment
      - Run CS-anchored reverse to find max ARR current CSM count can support
      - Detect CS under/over-capacity, Sales under/over-capacity, and lead volume insufficiency
      - Produce pipeline coverage check from win rate and current pipeline value
      - Generate AE:CSM:SDR headcount table with benchmark citations for board/CRO/CFO reviews

    out_of_scope:
      - Individual rep performance review (structural capacity tool, not rep coaching)
      - Pricing or packaging analysis
      - Customer health scoring or churn prediction on specific accounts
      - Detailed financial modeling with COGS, EBITDA, or equity dilution

    invocation_cues:
      - "model my GTM headcount"
      - "do I have enough CSMs"
      - "how much ARR can my CS team support"
      - "is my pipeline coverage healthy"
      - "run the unit of growth calculation"
      - "show me where my GTM org is over or under capacity"

    anti_cues:
      - Financial modeling with COGS or EBITDA (route to CFO model)
      - Individual rep quota review (route to quota-sensitivity-analysis)

    priority: high
    argument_hint: "current_arr, target_growth_pct, segment, motion — or provide current headcount for reverse model"

    required_context:
      - current_arr, target_growth_pct or new_arr_target
      - segment (SMB / Mid-Market / Enterprise / Strategic)
      - motion (Outbound-Heavy / Mixed / Inbound-Dominant / PLG)
      - ae_quota, ae_attainment (or accept benchmark defaults)
      - csm_model preference (ARR-based or account-based)
      - Optional: current AE/SDR/CSM counts, win rate, pipeline value, ACV, sales cycle

    consumes_files:
      - references/benchmark-library.md
      - references/metrics-and-glossary.md

    produces_artifacts:
      - UoG analysis: headcount model (AE/SDR/CSM/Support required vs. current)
      - CS capacity check (max supported ARR, headroom %, max AEs CS can support)
      - Pipeline coverage check (required coverage ratio, gap, coverage signal)
      - Imbalance signals (up to 5 categories, severity HIGH/MEDIUM)
      - Remediation actions (priority-ranked, concrete)
      - Optional: scenario comparison (conservative/base/aggressive)

    tools_used: []

    related_skills:
      - rev-ops.annual-planning-workflow
      - rev-ops.closed-won-to-cs-capacity-modeling
      - rev-ops.quota-sensitivity-analysis
      - rev-ops.scenario-modeling
      - rev-ops.pipeline-coverage-analysis

    execution_profile:
      reads_crm: false
      writes_crm: false
      reads_cs_platform: false
      calls_llm: false
      creates_linear_issue: false

    constraints:
      - Benchmark defaults applied explicitly with source citation (benchmark-library.md section and confidence tier)
      - All metrics and formulas answered from references/metrics-and-glossary.md — not training memory
      - Pipeline coverage = 1 ÷ win rate; never hardcode 3x rule
      - CS capacity check always runs when current CSM count is provided (non-optional)
      - Headcount outputs presented as ranges (±1 FTE) given benchmark variability
      - Distinguish planning attainment rate (75%) from KBCM actual median (55–65%)
      - CS is the binding constraint check: if Max AEs CS Can Support < AEs Required → flag immediately

    risk_level: low
    approval_needed: false

    success_criteria:
      - Headcount model complete (AE/SDR/CSM required, with gap vs. current if provided)
      - CS capacity check in both directions when CSM count provided
      - Pipeline coverage check present when win rate or pipeline value provided
      - All imbalance signals that fire include: what's happening, evidence, risk, severity
      - Every signal has at least one concrete remediation action
      - All benchmark defaults declared with source citation

    known_failure_modes:
      - Only ARR and growth provided (no headcount) → derive from benchmarks; note as target state not gap analysis
      - Only current headcount provided (no revenue target) → run CS-anchored reverse only; invite growth target
      - Win rate not provided → default 25% with explicit flag; recommend CRM verification
      - Segment ambiguous (mid-market + enterprise mix) → run both; present range; ask which is majority

