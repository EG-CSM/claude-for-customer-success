  - id: rev-ops.comp-simulation
    name: comp-simulation
    version: "1.0.0"
    domain: rev-ops
    category: revenue-modeling
    owner: rev-ops
    summary: >
      Models CSM and AE compensation plan outcomes against real or projected
      portfolio and pipeline data. Calculates attainment, payout, and acceleration
      tier projections under current and proposed plan structures. Outputs require
      HR and Finance dual review before distribution to reps (G3).
    intended_tasks:
      - Project individual rep payout under current quota and commission structure
      - Compare payout outcomes across two or more comp plan variants
      - Model impact of quota changes, accelerator threshold shifts, or kicker additions
      - Identify plan design anomalies (cliff risk, attainment bunching, unintended upside)
    out_of_scope:
      - Comp plan design decisions (advisory modeling only — HR and Finance own plan design)
      - Payroll processing or authoritative payout calculation
      - New logo / AE quota setting (contacts rev-ops for pipeline segmentation first)
    invocation_cues:
      - "model comp outcomes"
      - "comp simulation"
      - "what would reps earn under this plan"
      - "compare comp plan variants"
      - "attainment projection"
      - "accelerator modeling"
    anti_cues:
      - Request is for actual payroll processing — not in scope
      - Request is to design a new comp plan from scratch — route to HR/Finance
    priority: medium
    argument_hint: "[<rep-name-or-segment>] [--plan-a | --plan-b] [--attainment <pct>]"
    required_context:
      - Domain CLAUDE.md (reads at startup; routes to cold-start-interview if missing)
      - Current comp plan structure: quota, base rate, tiers, accelerators, kickers
      - Portfolio or pipeline data: ARR, renewal rates, expansion pipeline
      - Rep name(s) or segment scope (or "all CSMs" / "all AEs")
    consumes_files:
      - rev-ops/CLAUDE.md
      - company-profile.md
    produces_artifacts:
      - Comp simulation report (structured markdown)
      - Attainment and payout table by rep or segment
      - Plan variant comparison (if multiple plans modeled)
    tools_used:
      - CRM connector (pipeline and ARR data — optional; falls back to manual input)
    related_skills:
      - rev-ops.forecast-variance-analysis
      - rev-ops.growth-model-vs-actuals-tracking
      - rev-ops.deal-classification
    execution_profile:
      complexity: T2
      typical_turns: 4-7
      tool_calls_per_run: 2-5

    constraints:
      - G3: comp outputs require HR + Finance dual review before rep distribution
      - G6: all data reads must surface data-as-of timestamp
      - G1: outputs labeled as modeling scenarios, not authoritative payout figures
    risk_level: high
    approval_needed: true

    success_criteria:
      - Attainment and payout calculated for all specified reps or segments
      - Plan variant comparison table produced (if multiple plans in scope)
      - G3 review requirement flagged on every output
      - data-as-of timestamp present on all data reads
    known_failure_modes:
      - Comp plan structure not provided → prompt for quota, rate, and tier definitions before modeling
      - Pipeline data missing or stale → flag gap and request refresh; flag data-as-of timestamp
      - Output distributed without HR/Finance review → G3 violation; block and redirect

  - id: rev-ops.crm-hygiene-audit
    name: crm-hygiene-audit
    version: "1.0.0"
    domain: rev-ops
    category: data-quality
    owner: rev-ops
    summary: >
      Audits CRM data quality across four hygiene dimensions: field completion,
      stage integrity, duplicate presence, and data decay. Produces a scored
      hygiene report with prioritized remediation recommendations. All findings
      are read-only proposals; skill never edits CRM records autonomously (G9).
    intended_tasks:
      - Score overall CRM hygiene across four dimensions
      - Identify field completion gaps by stage gate
      - Flag stage-skipping, backward movement, or stale stage anomalies
      - Surface duplicate account/contact/opportunity candidates
      - Report data decay signals for accounts not updated within decay threshold
    out_of_scope:
      - Executing CRM edits (G9 — output is proposals only)
      - Deep duplicate merging (use duplicate-detection for confidence scoring)
      - Forecast variance analysis (use forecast-variance-analysis)

    invocation_cues:
      - "CRM audit"
      - "hygiene audit"
      - "data quality review"
      - "clean up the CRM"
      - "how healthy is our CRM data"
    anti_cues:
      - Requests to actually merge or edit records — output is findings only
      - Forecast accuracy analysis — route to forecast-variance-analysis
    priority: medium
    argument_hint: "Optionally scope to segment, team, or date range"

    required_context:
      - CRM data access (HubSpot preferred per data authority hierarchy)
      - Stage definitions and field completion requirements per stage
    consumes_files:
      - rev-ops domain CLAUDE.md (cold-start preflight)
    produces_artifacts:
      - Hygiene scorecard with dimension scores (Markdown)
      - Prioritized remediation recommendation list

    tools_used:
      - field-completion-monitoring (sub-reference)
      - stage-integrity-audit (sub-reference)
      - duplicate-detection (sub-reference)
      - data-decay-tracking (sub-reference)
    related_skills:
      - rev-ops.field-completion-monitoring
      - rev-ops.stage-integrity-audit
      - rev-ops.duplicate-detection
      - rev-ops.data-decay-tracking
    execution_profile:
      complexity: T2
      typical_turns: 4-8
      tool_calls_per_run: 3-6

    constraints:
      - G6: all data reads must surface data-as-of timestamp
      - G9: no autonomous CRM edits; all findings are proposals
      - G7: escalation path present for critical hygiene failures
    risk_level: medium
    approval_needed: false

    success_criteria:
      - All four hygiene dimensions scored
      - Critical gaps explicitly flagged with escalation path
      - data-as-of timestamp present on all data reads
    known_failure_modes:
      - CRM connector unavailable → surface failure; do not proceed on stale cache
      - Stage definitions not configured → cannot score stage integrity; request definitions

  - id: rev-ops.cross-system-reconciliation
    name: cross-system-reconciliation
    version: "1.0.0"
    domain: rev-ops
    category: data-quality
    owner: rev-ops
    summary: >
      Reconciles ARR, account, and pipeline data across CRM, Finance sheets, CS
      platform, and billing systems using the data authority hierarchy
      (HubSpot > Finance Sheets > CS platform > Slack/Linear). Surfaces
      discrepancies with delta magnitude and recommended resolution path.
      Never overwrites source systems autonomously.
    intended_tasks:
      - Reconcile ARR figures across CRM and Finance sheets
      - Surface account record discrepancies between CRM and CS platform
      - Identify pipeline count or stage mismatches across systems
      - Flag which system holds authoritative value per data authority hierarchy
    out_of_scope:
      - Overwriting source systems (G9)
      - Forecasting or pipeline coverage analysis (separate skills)
      - Territory or quota data (use planning sub-skills)

    invocation_cues:
      - "reconcile the data"
      - "CRM vs Finance discrepancy"
      - "cross-system reconciliation"
      - "why don't the numbers match"
      - "systems out of sync"
    anti_cues:
      - Single-system data quality — use crm-hygiene-audit
      - Forecast analysis — use forecast-variance-analysis
    priority: medium
    argument_hint: "Specify systems to reconcile and data domain (ARR/accounts/pipeline)"

    required_context:
      - Access to at least two of: CRM, Finance sheets, CS platform, billing
      - Data authority hierarchy configuration (from domain CLAUDE.md)
    consumes_files:
      - rev-ops domain CLAUDE.md (cold-start preflight)
    produces_artifacts:
      - Discrepancy report with delta magnitudes and authority resolution (Markdown)

    tools_used: []
    related_skills:
      - rev-ops.crm-hygiene-audit
      - rev-ops.data-decay-tracking
      - rev-ops.field-completion-monitoring
    execution_profile:
      complexity: T2
      typical_turns: 4-7
      tool_calls_per_run: 2-5

    constraints:
      - G6: data-as-of timestamp on all reads
      - G9: no autonomous system writes; discrepancies are flagged, not corrected
      - Data authority hierarchy must be applied; HubSpot wins on conflict unless Finance has override
    risk_level: medium
    approval_needed: false

    success_criteria:
      - Discrepancies identified with delta magnitude and authority source named
      - Resolution path recommended for each discrepancy
      - data-as-of timestamps present on all data pulls
    known_failure_modes:
      - Connector to one system unavailable → partial reconciliation; label what was skipped
      - Authority hierarchy not configured → request configuration before proceeding

  - id: rev-ops.csql-tracking
    name: csql-tracking
