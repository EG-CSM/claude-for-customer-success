    owner: rev-ops
    summary: >
      Builds structured, verifiable outcome statements using the Seven-Stage
      Value Chain. Two-phase with human approval gate between phases.
      Produces a Markdown Outcome & Value Registry and an HTML review deck
      for cross-functional ratification. Inputs are product capability descriptions
      or draft outcome statements.
