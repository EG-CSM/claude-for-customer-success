  - id: rev-ops.deal-to-outcome-tracing
    name: deal-to-outcome-tracing
    version: "1.0.0"
    domain: rev-ops
    category: outcome-tracking
    owner: rev-ops
    summary: >
      Traces closed-won deals through post-close outcome milestones using the
      L0-L3 rubric (L0 no measurement, L1 tracking started, L2 milestone hit,
      L3 outcome validated). Runs at-close completeness checks (OCV entry,
      trigger match, measurement source) and milestone assessments at 30/60/90/180d.
      Coordinates with outcome-to-value-tracking for systemic pattern analysis.
    intended_tasks:
      - Run at-close completeness check for closed-won deals
      - Assess outcome milestone achievement at 30/60/90/180d checkpoints
      - Score each account-OCV pair on L0-L3 rubric
      - Flag systemic L0 persistence when >40% of accounts show no measurement
      - Structural fallback when OCV entry is absent
    out_of_scope:
      - Building OCV entries (use outcome-statement-builder)
      - Full value tracking pattern analysis (use outcome-to-value-tracking)
      - CRM edits (G9)

    invocation_cues:
      - "outcome tracing"
      - "deal to outcome"
      - "post-close milestone check"
      - "how are outcomes tracking"
      - "L0-L3 rubric assessment"
    anti_cues:
      - Building outcome statements — use outcome-statement-builder
      - System-wide pattern analysis — use outcome-to-value-tracking
    priority: medium
    argument_hint: "Provide account ID(s) or closed-won cohort and checkpoint interval"

    required_context:
      - Closed-won deal data with OCV entries (where available)
      - Milestone definitions per checkpoint interval
      - CS platform activity data
    consumes_files:
      - rev-ops domain CLAUDE.md (cold-start preflight)
    produces_artifacts:
      - At-close completeness check report (Markdown)
      - L0-L3 milestone assessment per account-OCV pair
      - Systemic pattern flags when L0 persistence >40%

    tools_used:
      - outcome-to-value-tracking (coordination)
    related_skills:
      - rev-ops.outcome-to-value-tracking
      - rev-ops.outcome-statement-builder
      - rev-ops.sales-cs-handoff-quality-scoring
    execution_profile:
      complexity: T2
      typical_turns: 4-8
      tool_calls_per_run: 2-5

    constraints:
      - G5: assessment is analytical input, not performance ruling
      - G6: data-as-of timestamp on all reads
      - G8: only Ratified OCV entries used; provisional OCV flagged
      - Structural fallback when OCV absent; Low confidence on inferred outcomes
    risk_level: medium
    approval_needed: false

    success_criteria:
      - At-close completeness check completed for all provided deals
      - L0-L3 rubric applied at each checkpoint
      - Systemic L0 pattern flagged when threshold exceeded
      - data-as-of timestamp present; OCV source declared
    known_failure_modes:
      - OCV entry absent → fallback to structural assessment; flag [Confidence: Low]
      - Milestone data unavailable at checkpoint → flag gap; do not infer achievement
      - CS platform connector unavailable → surface failure; do not proceed on stale data

