  - id: rev-ops.duplicate-detection
    name: duplicate-detection
    version: "1.0.0"
    domain: rev-ops
    category: data-quality
    owner: rev-ops
    summary: >
      Detects duplicate accounts, contacts, and opportunities using multi-signal
      matching. Assigns confidence scores (High: 2+ signals no conflict,
      Medium: 1 strong signal with differences, Low: partial match). Never
      merges records autonomously (G9); all findings are proposals for human review.
    intended_tasks:
      - Identify duplicate account, contact, or opportunity records in CRM
      - Score confidence of each duplicate match
      - Produce merge candidate report for human review
      - Feed duplicate dimension into crm-hygiene-audit
    out_of_scope:
      - Merging or deleting records autonomously (G9)
      - Full CRM hygiene audit (use crm-hygiene-audit)

    invocation_cues:
      - "duplicate accounts"
      - "duplicate contacts"
      - "find duplicates"
      - "deduplication"
      - "duplicate detection"
    anti_cues:
      - Record merging — output is candidates only; user must approve and execute
      - Full hygiene audit — use crm-hygiene-audit
    priority: medium
    argument_hint: "Specify record type (account/contact/opportunity) and optionally scope to segment"

    required_context:
      - CRM data access (HubSpot preferred)
      - Matching signal configuration (domain, name similarity, email, phone)
    consumes_files:
      - rev-ops domain CLAUDE.md (cold-start preflight)
    produces_artifacts:
      - Duplicate candidate report with confidence scores (Markdown)

    tools_used: []
    related_skills:
      - rev-ops.crm-hygiene-audit
      - rev-ops.cross-system-reconciliation
    execution_profile:
      complexity: T1
      typical_turns: 2-4
      tool_calls_per_run: 1-2

    constraints:
      - G6: data-as-of timestamp on all CRM reads
      - G9: no autonomous record merges or deletes
    risk_level: low
    approval_needed: false

    success_criteria:
      - Duplicate candidates identified with confidence scores
      - High/Medium/Low confidence correctly applied per signal count
      - All findings presented as proposals, not actions
    known_failure_modes:
      - CRM connector unavailable → surface failure; do not proceed on stale data
      - Matching signals not configured → use name similarity as fallback; disclose

  - id: rev-ops.early-churn-downgrade-signal-detection
    name: early-churn-downgrade-signal-detection
    version: "1.0.0"
    domain: rev-ops
    category: risk-management
    owner: rev-ops
    summary: >
      Detects early churn and downgrade signals using a 3-tier model:
      Tier 1 at-close (rule-mode or cohort-mode; cohort requires 6+ months data),
      Tier 2 30-90d behavioral, Tier 3 90-120d pre-renewal. Produces risk flags
      with tier classification and recommended intervention. Output is analytical
      input (G5); escalation path required on all flags (G7).
    intended_tasks:
      - Run Tier 1 rule-mode or cohort-mode detection at deal close
      - Surface Tier 2 behavioral signals at 30-90d post-close
      - Identify Tier 3 pre-renewal risk signals at 90-120d
      - Produce risk flag report with tier classification
      - Route flags to csm:risk-flag cross-plugin handoff
    out_of_scope:
      - Churn intervention execution (route to CSM skill)
      - Renewal pipeline management (use renewals domain)
      - CRM edits (G9)

    invocation_cues:
      - "churn signals"
      - "downgrade risk"
      - "early churn detection"
      - "at-risk accounts"
      - "Tier 1 churn check"
    anti_cues:
      - Renewal pipeline analysis — use renewals domain skills
      - Post-churn analysis — use outcome-to-value-tracking
    priority: high
    argument_hint: "Specify tier (1/2/3), account(s), and cohort definition for Tier 1 cohort-mode"

    required_context:
      - Account activity and health data from CS platform
      - Cohort baseline (6+ months of data for cohort-mode)
      - Renewal date for Tier 3 detection window
    consumes_files:
      - rev-ops domain CLAUDE.md (cold-start preflight)
    produces_artifacts:
      - Risk flag report with tier classification and intervention recommendation (Markdown)

    tools_used:
      - csm.risk-flag (cross-plugin handoff)
    related_skills:
      - csm.risk-flag
      - renewals.risk-assessment
      - rev-ops.deal-desk-workflow-management
    execution_profile:
      complexity: T2
      typical_turns: 3-6
      tool_calls_per_run: 2-4

    constraints:
      - G5: output is analytical input, not performance ruling
      - G6: data-as-of timestamp on all reads
      - G7: escalation path required on all risk flags
      - Cohort-mode requires 6+ months of data; fall back to rule-mode if insufficient
    risk_level: high
    approval_needed: false

    success_criteria:
      - Correct tier applied based on account lifecycle stage
      - Cohort-mode data sufficiency check passed before use
      - Escalation path present on all flagged accounts
      - data-as-of timestamp present
    known_failure_modes:
      - Insufficient cohort data → fall back to rule-mode; disclose fallback
      - CS platform unavailable → surface failure; do not infer signals
      - Missing renewal date → Tier 3 window cannot be computed; request date

