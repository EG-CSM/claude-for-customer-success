      - "draft plan"
      - "update plan"
      - "plan document"
    anti_cues:
      - Kickoff preparation (use kickoff-prep)
      - Success criteria definition session (use success-criteria --define)
    priority: standard
    argument_hint: "[<account-name-or-ID>] [--draft | --update | --summary]"
    required_context:
      - onboarding CLAUDE.md (onboarding model, milestone framework, plan format)
    consumes_files:
      - onboarding/CLAUDE.md
    produces_artifacts:
      - Customer-facing onboarding plan document (--draft)
      - Revised plan with change log (--update)
      - Status summary for async updates (--summary)
    tools_used:
