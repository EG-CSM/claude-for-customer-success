      (re-engagement, executive sponsor introduction, competitive displacement,
      pricing restructure, champion activation). Every recommendation includes
      what/who/why. Routes applicable flags to csm:risk-flag cross-plugin handoff.
      Output is guidance only (G5); escalation path required (G7).
    intended_tasks:
      - Receive deal health signals (sub-50 scores) and identify best intervention
      - Match intervention type to signal pattern
      - Produce structured recommendation with what/who/why for each deal
      - Route CS-relevant flags to csm:risk-flag
    out_of_scope:
      - Executing interventions autonomously
      - Deal health scoring (upstream — use deal-health-scoring)
      - CRM edits (G9)

    invocation_cues:
      - "next best action"
      - "what should we do with this deal"
      - "intervention recommendation"
      - "at-risk deal playbook"
      - "deal recovery"
    anti_cues:
      - Deal health scoring — use deal-health-scoring (upstream)
      - Approval routing — use deal-desk-workflow-management
    priority: high
    argument_hint: "Provide deal health scores or deal IDs; or pass sub-50 list from deal-health-scoring"

    required_context:
      - Deal health scores (from deal-health-scoring output)
      - Deal context: stage, stakeholders, competitive flags
    consumes_files:
      - rev-ops domain CLAUDE.md (cold-start preflight)
    produces_artifacts:
      - Next-best-action recommendation per deal with what/who/why (Markdown)

    tools_used:
      - csm.risk-flag (cross-plugin handoff for CS-relevant flags)
    related_skills:
      - rev-ops.deal-health-scoring
      - csm.risk-flag
      - rev-ops.pipeline-velocity-tracking
    execution_profile:
      complexity: T2
      typical_turns: 3-5
      tool_calls_per_run: 1-3

    constraints:
      - G5: recommendations are guidance, not directives
      - G7: escalation path present on all risk-flagged deals
      - Never executes interventions autonomously
    risk_level: medium
    approval_needed: false

    success_criteria:
      - Intervention type matched to each sub-50 deal signal
      - Every recommendation includes what/who/why
      - CS-relevant flags routed to csm:risk-flag
      - Escalation path present
    known_failure_modes:
      - Missing deal context → recommendation may be generic; request context before proceeding
      - csm:risk-flag cross-plugin unavailable → note handoff failure; include flag in output for manual routing

  - id: rev-ops.non-standard-terms-detection
    name: non-standard-terms-detection
    version: "1.0.0"
    domain: rev-ops
    category: deal-management
    owner: rev-ops
    summary: >
      Detects non-standard contract terms across four pattern categories:
      payment schedule deviations, liability/indemnification modifications,
      SLA commitments outside standard tier, and IP or data provisions.
      Routes findings to Legal or Finance; creates Linear issues for tracking.
      Sub-component of deal-desk-workflow-management.
    intended_tasks:
      - Scan contract or deal terms for non-standard patterns
      - Classify finding by category (payment/liability/SLA/IP)
      - Route to Legal or Finance based on category
      - Create Linear issue for tracking and approval record
    out_of_scope:
      - Approving non-standard terms (routes to Legal/Finance)
      - Full deal desk workflow (use deal-desk-workflow-management)
      - Discount monitoring (use discount-threshold-monitoring)

    invocation_cues:
      - "non-standard terms"
      - "contract terms review"
      - "unusual terms"
      - "terms deviation"
      - "contract red flags"
    anti_cues:
      - Discount analysis — use discount-threshold-monitoring
      - Full deal routing — use deal-desk-workflow-management
    priority: medium
    argument_hint: "Provide contract text or deal terms; specify deal ID if available"

    required_context:
      - Contract or deal terms text
      - Standard terms baseline (from domain CLAUDE.md)
    consumes_files:
      - rev-ops domain CLAUDE.md (cold-start preflight)
    produces_artifacts:
      - Non-standard terms finding report with category and routing (Markdown)
      - Linear issue for each finding requiring approval

    tools_used:
      - Linear (issue creation)
    related_skills:
      - rev-ops.deal-desk-workflow-management
      - rev-ops.discount-threshold-monitoring
      - rev-ops.revenue-leakage-scanning
    execution_profile:
      complexity: T1
      typical_turns: 2-4
      tool_calls_per_run: 1-2

    constraints:
      - G1: never approves non-standard terms autonomously
      - Routing to Legal/Finance is required for all findings
    risk_level: medium
    approval_needed: false

    success_criteria:
      - All non-standard terms identified and categorized
      - Correct routing target (Legal/Finance) identified per category
      - Linear issue created for each finding
    known_failure_modes:
      - Standard terms baseline not configured → flag; cannot assess deviations without baseline
      - Contract text not provided → request; do not infer from deal record alone

  - id: rev-ops.outcome-statement-builder
    name: outcome-statement-builder
    version: "1.0.0"
    domain: rev-ops
