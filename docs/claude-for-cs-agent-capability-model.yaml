      - "track expansion lead"
      - "CSQL pipeline"
      - "update expansion opportunity"
      - "expansion pipeline report"
      - "close out CSQL"
    anti_cues:
      - New logo opportunity — not in scope; route to sales pipeline
      - Renewal probability question — route to renewals.renewal-forecast
    priority: high
    argument_hint: "[<account-name>] [--stage <stage>] [--arr <value>] [--won | --lost]"
    required_context:
      - Domain CLAUDE.md (reads at startup; routes to cold-start-interview if missing)
      - Account name or ID
      - CSQL source: expansion-business-case, health-score-signal, or CSM-nomination
      - Estimated expansion ARR
      - Current pipeline stage
    consumes_files:
      - rev-ops/CLAUDE.md
      - company-profile.md
    produces_artifacts:
      - CSQL log entry (structured markdown or CRM field update proposal)
      - CSQL pipeline health report (volume, velocity, conversion — on report request)
      - Expansion-onboarding handoff brief (on --won close)
    tools_used:
      - CRM connector (Salesforce/HubSpot — optional; falls back to manual log)
    related_skills:
      - csm.expansion-business-case
      - csm.expansion-onboarding
      - rev-ops.forecast-variance-analysis
      - renewals.renewal-forecast
    execution_profile:
      complexity: T1
      typical_turns: 2-4
      tool_calls_per_run: 1-3

    constraints:
      - G6: all pipeline data reads surface data-as-of timestamp
      - G9: CRM log entries are proposals until user confirms; no autonomous CRM writes
    risk_level: low
    approval_needed: false

    success_criteria:
      - CSQL logged with source, ARR, stage, and owning CSM
      - Pipeline stage updated to current state on update requests
      - Expansion-onboarding handoff brief produced on --won close
      - data-as-of timestamp present on all CRM reads
    known_failure_modes:
      - CSQL source not specified → prompt before logging (source is required for pipeline attribution)
