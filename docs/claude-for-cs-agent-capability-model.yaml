  - id: rev-ops.forecast-variance-analysis
    name: forecast-variance-analysis
    version: "1.0.0"
    domain: rev-ops
    category: forecasting
    owner: rev-ops
    summary: >
      Analyzes forecast vs. actuals variance across five root cause categories
      (deal slippage, classification error, competitive loss, timing shift,
      territory gap). Applies pattern confidence gate before surfacing systemic
      diagnosis (≥3 deals or ≥2 consecutive quarters). Output feeds revenue-brief
      generation and GTM metrics pulse.
    intended_tasks:
      - Compute forecast vs. actuals delta for a period
      - Classify variance by root cause category
      - Apply pattern confidence gate before systemic diagnosis
      - Produce variance report with prioritized root cause ranking
      - Feed variance findings into revenue-brief-generation
    out_of_scope:
      - Forecast generation (use deal-classification + scenario-modeling)
      - CRM edits (G9)
      - Pipeline coverage analysis (use pipeline-coverage-analysis)

    invocation_cues:
      - "forecast variance"
      - "why did we miss"
      - "forecast accuracy"
      - "actuals vs forecast"
      - "forecast analysis"
    anti_cues:
      - Pipeline coverage (forward-looking) — use pipeline-coverage-analysis
      - Deal classification (input to forecast) — use deal-classification
    priority: high
    argument_hint: "Specify period (quarter/month) and optionally scope to team or segment"

    required_context:
      - Forecast figures by period (from CRM or Finance sheets)
      - Actuals by period
      - Deal-level data for root cause attribution
    consumes_files:
      - rev-ops domain CLAUDE.md (cold-start preflight)
    produces_artifacts:
      - Variance report with root cause ranking (Markdown)
      - Systemic pattern memo when confidence gate passes

    tools_used: []
    related_skills:
      - rev-ops.deal-classification
      - rev-ops.revenue-brief-generation
      - rev-ops.gtm-unified-metrics-pulse
      - rev-ops.pipeline-coverage-analysis
    execution_profile:
      complexity: T2
      typical_turns: 4-7
      tool_calls_per_run: 2-4

    constraints:
      - G1: all ARR figures flagged [review — not yet a revenue commitment]
      - G6: data-as-of timestamp on all reads
      - Pattern confidence gate: ≥3 deals or ≥2 consecutive quarters before systemic diagnosis
    risk_level: medium
    approval_needed: false

    success_criteria:
      - Variance computed and root cause categories assigned
      - Pattern confidence gate applied correctly
      - Systemic diagnosis only surfaced when gate passes
      - data-as-of timestamp present
    known_failure_modes:
      - Actuals data unavailable → cannot compute variance; surface failure
      - Insufficient data for confidence gate → surface gap analysis only; no systemic diagnosis
      - Forecast and actuals from different systems → reconcile via data authority hierarchy first

