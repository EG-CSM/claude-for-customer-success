  - id: rev-ops.annual-planning-workflow
    name: annual-planning-workflow
    version: "1.0.0"
    domain: rev-ops
    category: planning
    owner: rev-ops
    summary: >
      Orchestrates the 7-phase annual GTM planning cycle — from scope setup through
      board ratification. Coordinates scenario-modeling, quota-sensitivity-analysis,
      unit-of-growth-calculator, and revenue-brief-generation
      as sub-agents. Each phase has a named human approval gate; the skill never
      advances past a gate without explicit user confirmation.
    intended_tasks:
      - Orchestrate the full annual planning cycle end-to-end
      - Coordinate sub-agent calls (scenario, quota, UoG, territory, revenue-brief)
      - Present phase deliverables and gate approval prompts to RevOps lead
      - Route midcycle replans when drift triggers fire
    out_of_scope:
      - Executing individual sub-agent tasks directly (delegates to sub-skills)
      - Issuing hiring decisions or comp changes (output is proposals only)
      - CRM edits of any kind

    invocation_cues:
      - "annual planning"
      - "GTM planning cycle"
      - "run the planning process"
      - "fiscal year planning"
      - "start planning workflow"
    anti_cues:
      - Single-phase request (quota only, territory only) — route to the sub-skill directly
      - Mid-year replan — use mid-year-replan-triggering instead
    priority: high
    argument_hint: "Optionally specify fiscal year or phase to resume from"

    required_context:
      - Prior-year ARR actuals and growth rates
      - Current pipeline snapshot (for scenario inputs)
      - Headcount and pod structure for UoG calculation
    consumes_files:
      - rev-ops domain CLAUDE.md (cold-start preflight)
    produces_artifacts:
      - Phase-gated planning memo per phase (Markdown)
      - Final annual plan document pending board ratification

    tools_used:
      - scenario-modeling (sub-agent)
      - quota-sensitivity-analysis (sub-agent)
      - unit-of-growth-calculator (sub-agent)
      - revenue-brief-generation (sub-agent)
    related_skills:
      - rev-ops.mid-year-replan-triggering
      - rev-ops.scenario-modeling
      - rev-ops.quota-sensitivity-analysis
      - rev-ops.unit-of-growth-calculator
    execution_profile:
      complexity: T3
      typical_turns: 15-25
      tool_calls_per_run: 10-20

    constraints:
      - G1: all ARR/revenue figures flagged [review — not yet a revenue commitment]
      - G2: capacity outputs are structural signals, not hiring mandates
      - G3: comp model proposals require HR + Finance dual review
      - G4: territory outputs require RevOps lead + Sales lead dual confirmation
      - Every phase gate requires explicit human approval before advancing
    risk_level: high
    approval_needed: true

    success_criteria:
      - All 7 phases completed with documented human approval at each gate
      - Sub-agent outputs incorporated into phase deliverables
      - Final plan document carries board ratification status
    known_failure_modes:
      - Missing prior-year actuals → scenario inputs unreliable; flag and request
      - User skips gate approval → skill must re-prompt, not advance silently
      - Sub-agent failure mid-cycle → surface error, hold phase, do not proceed

